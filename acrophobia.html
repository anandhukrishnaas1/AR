<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acrophobia — PhobiaVR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- UI Overlay -->
  <div class="scene-ui">
    <div class="scene-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>🏔️ Acrophobia Therapy</h1>
      <div></div>
    </div>
    <div class="level-selector">
      <button class="level-btn active" onclick="setLevel(1)">Level 1: Balcony</button>
      <button class="level-btn" onclick="setLevel(2)">Level 2: Rooftop</button>
      <button class="level-btn" onclick="setLevel(3)">Level 3: Cliff Edge</button>
    </div>
  </div>

  <!-- Breathing Guide -->
  <div class="breathing-guide">
    <div class="breath-circle">Breathe In</div>
    <div class="breath-label">Follow the rhythm</div>
  </div>

  <!-- Anxiety Meter -->
  <div class="anxiety-meter">
    <span class="meter-label">Anxiety</span>
    <div class="meter-track">
      <div class="meter-fill" style="height: 30%"></div>
    </div>
  </div>

  <!-- Comfort Message -->
  <div class="comfort-msg" style="opacity: 0;">You're safe here.</div>

  <!-- A-Frame Scene -->
  <a-scene id="vrscene" vr-mode-ui="enabled: true" renderer="antialias: true; precision: medium">
    <!-- Camera -->
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls wasd-controls="acceleration: 20">
        <a-cursor color="#ffa94d" fuse="false" raycaster="far: 100"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- ========== LEVEL 1: Apartment Balcony (low height) ========== -->
    <a-entity id="level1" visible="true">
      <!-- Sky -->
      <a-sky color="#87CEEB"></a-sky>
      <a-light type="ambient" color="#ffffff" intensity="0.7" cast-shadow="false"></a-light>
      <a-light type="directional" position="1 3 2" color="#fffbe0" intensity="1" cast-shadow="true" shadow-mapsize="1024"></a-light>

      <!-- Building the player is on (2nd floor) -->
      <a-box position="0 -1 -1" width="6" height="0.2" depth="4" material="color: #c0a882; roughness: 0.85; metalness: 0; shader: standard"></a-box>
      
      <!-- Balcony railing -->
      <a-box position="0 0 -3" width="6" height="1" depth="0.08" material="color: #555; opacity: 0.8; transparent: true; roughness: 0.4; metalness: 0.6; shader: standard"></a-box>
      <a-cylinder position="-3 0.5 -3" radius="0.03" height="1" material="color: #555"></a-cylinder>
      <a-cylinder position="-2 0.5 -3" radius="0.03" height="1" material="color: #555"></a-cylinder>
      <a-cylinder position="-1 0.5 -3" radius="0.03" height="1" material="color: #555"></a-cylinder>
      <a-cylinder position="0 0.5 -3" radius="0.03" height="1" material="color: #555"></a-cylinder>
      <a-cylinder position="1 0.5 -3" radius="0.03" height="1" material="color: #555"></a-cylinder>
      <a-cylinder position="2 0.5 -3" radius="0.03" height="1" material="color: #555"></a-cylinder>
      <a-cylinder position="3 0.5 -3" radius="0.03" height="1" material="color: #555"></a-cylinder>
      <!-- Top rail -->
      <a-box position="0 1 -3" width="6" height="0.06" depth="0.1" material="color: #555"></a-box>
      
      <!-- Walls behind -->
      <a-box position="0 1.5 1" width="6" height="3" depth="0.2" material="color: #e8dcc8"></a-box>
      <a-box position="-3 1.5 -1" width="0.2" height="3" depth="4" material="color: #e8dcc8"></a-box>
      <a-box position="3 1.5 -1" width="0.2" height="3" depth="4" material="color: #e8dcc8"></a-box>
      
      <!-- Door to inside -->
      <a-box position="-1 1.2 0.9" width="1" height="2.2" depth="0.1" material="color: #8b6f47"></a-box>
      
      <!-- Ground below (2nd floor ~ 5m) -->
      <a-plane position="0 -5 -10" rotation="-90 0 0" width="50" height="50" material="color: #7a9b5a"></a-plane>
      
      <!-- Street below -->
      <a-box position="0 -4.9 -8" width="6" height="0.05" depth="30" material="color: #555"></a-box>
      
      <!-- Opposite building -->
      <a-box position="0 0 -15" width="10" height="12" depth="5" material="color: #d4c4a8"></a-box>
      
      <!-- Trees below -->
      <a-entity position="-4 -3 -6">
        <a-cylinder radius="0.15" height="2" material="color: #6b4c33"></a-cylinder>
        <a-sphere position="0 1.5 0" radius="0.8" material="color: #4a8b3a"></a-sphere>
      </a-entity>
      <a-entity position="4 -3 -8">
        <a-cylinder radius="0.15" height="2" material="color: #6b4c33"></a-cylinder>
        <a-sphere position="0 1.5 0" radius="0.8" material="color: #5a9b4a"></a-sphere>
      </a-entity>
      
      <!-- Balcony plant -->
      <a-entity position="2.5 0 -2.5">
        <a-box width="0.4" height="0.3" depth="0.4" material="color: #8b5a3a"></a-box>
        <a-sphere position="0 0.3 0" radius="0.25" material="color: #3a8b3a"></a-sphere>
      </a-entity>
      
      <a-text value="2nd Floor — Look over the railing gently." 
              position="0 2.5 -2" align="center" color="#ffa94d" scale="0.5 0.5 0.5" face-camera></a-text>
    </a-entity>

    <!-- ========== LEVEL 2: Rooftop (medium height) ========== -->
    <a-entity id="level2" visible="false">
      <!-- Sky -->
      <a-sky color="#6CA6CD"></a-sky>
      <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
      <a-light type="directional" position="1 3 2" color="#fffbe0" intensity="0.9"></a-light>
      
      <!-- Wind sound effect (visual indicator) -->
      <a-text value="~ wind ~" position="3 2 -3" color="#88aacc" scale="0.3 0.3 0.3"
              float-anim="amplitude: 0.1; speed: 2000"></a-text>
      
      <!-- Rooftop surface -->
      <a-box position="0 0 0" width="14" height="0.2" depth="14" material="color: #888"></a-box>
      
      <!-- Roof edge (low wall) -->
      <a-box position="0 0.4 -7" width="14" height="0.8" depth="0.3" material="color: #777"></a-box>
      <a-box position="-7 0.4 0" width="0.3" height="0.8" depth="14" material="color: #777"></a-box>
      <a-box position="7 0.4 0" width="0.3" height="0.8" depth="14" material="color: #777"></a-box>
      <a-box position="0 0.4 7" width="14" height="0.8" depth="0.3" material="color: #777"></a-box>
      
      <!-- Roof structures -->
      <a-box position="4 1.5 4" width="2" height="3" depth="2" material="color: #999"></a-box>
      <a-box position="-5 0.8 5" width="3" height="1.6" depth="2" material="color: #aaa"></a-box>
      
      <!-- AC units -->
      <a-box position="3 0.4 2" width="1" height="0.8" depth="0.6" material="color: #bbb"></a-box>
      <a-box position="3 0.4 3.5" width="1" height="0.8" depth="0.6" material="color: #bbb"></a-box>
      
      <!-- City below (30m / ~10 floors) -->
      <a-plane position="0 -30 0" rotation="-90 0 0" width="200" height="200" material="color: #555"></a-plane>
      
      <!-- Surrounding buildings of varying heights -->
      <a-box position="-15 -10 -15" width="8" height="20" depth="8" material="color: #b0a090"></a-box>
      <a-box position="15 -5 -10" width="6" height="25" depth="6" material="color: #a0a0b0"></a-box>
      <a-box position="-10 -15 10" width="7" height="15" depth="7" material="color: #c0b0a0"></a-box>
      <a-box position="12 -8 15" width="9" height="22" depth="8" material="color: #90a0a0"></a-box>
      <a-box position="0 -12 -20" width="10" height="18" depth="6" material="color: #a8a088"></a-box>
      <a-box position="-18 -5 0" width="6" height="25" depth="10" material="color: #b8b098"></a-box>
      
      <!-- Cars far below (tiny) -->
      <a-box position="2 -29.5 -12" width="0.4" height="0.2" depth="0.8" material="color: #cc3333"></a-box>
      <a-box position="3 -29.5 -14" width="0.4" height="0.2" depth="0.8" material="color: #3333cc"></a-box>
      <a-box position="1 -29.5 -16" width="0.4" height="0.2" depth="0.8" material="color: #ffffff"></a-box>
      
      <a-text value="10th Floor Rooftop — Walk to the edge slowly." 
              position="0 2.5 -3" align="center" color="#ffa94d" scale="0.5 0.5 0.5" face-camera></a-text>
    </a-entity>

    <!-- ========== LEVEL 3: Mountain Cliff Edge ========== -->
    <a-entity id="level3" visible="false">
      <!-- Sky with clouds -->
      <a-sky color="#4a8fe7"></a-sky>
      
      <!-- Sun -->
      <a-light type="directional" position="2 5 3" color="#fff8e0" intensity="1"></a-light>
      <a-light type="ambient" color="#8ac" intensity="0.4"></a-light>

      <!-- Clouds -->
      <a-entity position="-10 -10 -30">
        <a-sphere radius="4" material="color: #fff; opacity: 0.6; transparent: true"></a-sphere>
        <a-sphere position="3 0.5 0" radius="3" material="color: #fff; opacity: 0.5; transparent: true"></a-sphere>
        <a-sphere position="-2 -0.5 1" radius="3.5" material="color: #fff; opacity: 0.5; transparent: true"></a-sphere>
      </a-entity>
      <a-entity position="20 -5 -40">
        <a-sphere radius="5" material="color: #fff; opacity: 0.4; transparent: true"></a-sphere>
        <a-sphere position="4 1 0" radius="3.5" material="color: #fff; opacity: 0.4; transparent: true"></a-sphere>
      </a-entity>
      <a-entity position="-25 5 -50" float-anim="amplitude: 1; speed: 8000">
        <a-sphere radius="6" material="color: #fff; opacity: 0.3; transparent: true"></a-sphere>
        <a-sphere position="5 0 2" radius="4" material="color: #fff; opacity: 0.3; transparent: true"></a-sphere>
      </a-entity>
      
      <!-- Cliff surface (the ground you stand on) -->
      <a-box position="0 -0.5 3" width="8" height="1" depth="8" material="color: #8a7a5a"></a-box>
      <a-box position="1 -1.5 4" width="6" height="2" depth="5" material="color: #7a6a4a"></a-box>
      <a-box position="-1 -3 5" width="10" height="5" depth="6" material="color: #6a5a3a"></a-box>
      
      <!-- Cliff edge — drops off sharply -->
      <a-box position="0 -1 -0.5" width="8" height="0.5" depth="1" material="color: #8a7a5a" 
             geometry="primitive: box"></a-box>
      
      <!-- Cliff face going down -->
      <a-box position="0 -50 -2" width="10" height="100" depth="2" material="color: #6a5a3a"></a-box>
      
      <!-- Valley far below -->
      <a-plane position="0 -100 -30" rotation="-90 0 0" width="300" height="300" 
               material="color: #3a6b2a"></a-plane>
      
      <!-- River at bottom -->
      <a-plane position="5 -99.5 -30" rotation="-90 0 0" width="8" height="200" 
               material="color: #4499bb; opacity: 0.8; transparent: true"></a-plane>
      
      <!-- Distant mountains -->
      <a-cone position="-40 -60 -80" radius-bottom="30" height="60" material="color: #5a6a5a"></a-cone>
      <a-cone position="30 -50 -100" radius-bottom="40" height="80" material="color: #4a5a4a"></a-cone>
      <a-cone position="-10 -40 -120" radius-bottom="50" height="100" material="color: #6a7a6a"></a-cone>
      <a-cone position="60 -55 -90" radius-bottom="35" height="70" material="color: #5a6a5a"></a-cone>
      
      <!-- Snow caps -->
      <a-cone position="-40 -35 -80" radius-bottom="12" height="10" material="color: #fff"></a-cone>
      <a-cone position="30 -15 -100" radius-bottom="15" height="12" material="color: #fff"></a-cone>
      <a-cone position="-10 5 -120" radius-bottom="18" height="15" material="color: #fff"></a-cone>
      
      <!-- Small rocks on cliff -->
      <a-sphere position="-2 0.1 2" radius="0.2" material="color: #999"></a-sphere>
      <a-sphere position="1.5 0.1 4" radius="0.3" material="color: #888"></a-sphere>
      <a-sphere position="-3 0.1 5" radius="0.15" material="color: #aaa"></a-sphere>
      
      <!-- Birds in the distance -->
      <a-text value="v" position="-5 10 -20" color="#333" scale="0.5 0.5 0.5"
              float-anim="amplitude: 0.5; speed: 4000"></a-text>
      <a-text value="v" position="-3 12 -25" color="#333" scale="0.4 0.4 0.4"
              float-anim="amplitude: 0.3; speed: 3500"></a-text>
      
      <!-- Wind indicator -->
      <a-text value="≈ strong wind ≈" position="3 2 1" color="#aaccee" scale="0.3 0.3 0.3"
              float-anim="amplitude: 0.2; speed: 1500"></a-text>
      
      <a-text value="Mountain Cliff — 300m above the valley.\nYou're safe. Look down when ready." 
              position="0 3 0" align="center" color="#ffa94d" scale="0.5 0.5 0.5" face-camera></a-text>
    </a-entity>
  </a-scene>

  <script src="shared.js"></script>
  <script>
    function setLevel(num) {
      document.getElementById('level1').setAttribute('visible', num === 1);
      document.getElementById('level2').setAttribute('visible', num === 2);
      document.getElementById('level3').setAttribute('visible', num === 3);

      const rig = document.getElementById('rig');
      if (num === 1) rig.setAttribute('position', '0 1.6 0');
      if (num === 2) rig.setAttribute('position', '0 1.8 0');
      if (num === 3) rig.setAttribute('position', '0 1.6 4');

      document.querySelectorAll('.level-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === num - 1);
      });
      showComfortMessage();
    }

    window.addEventListener('load', () => {
      initPhobiaScene();
      initVRPhobiaApp();
      setLevel(1);
    });
  </script>
</body>
</html>
