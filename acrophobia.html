<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acrophobia — PhobiaVR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    #height-indicator{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:100;color:#ffa94d;font-family:Inter,sans-serif;font-size:14px;text-align:right;pointer-events:none;text-shadow:0 0 10px rgba(255,169,77,0.8)}
    #height-indicator .height-val{font-size:28px;font-weight:800;display:block}
    #wind-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;opacity:0;transition:opacity 1s}
    #vertigo-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;opacity:0;transition:opacity 2s;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.4) 100%)}
  </style>
</head>
<body>
  <div id="height-indicator"><span class="height-val" id="alt-display">200m</span>above ground</div>
  <div id="wind-overlay"></div>
  <div id="vertigo-overlay"></div>
  <div class="scene-ui">
    <div class="scene-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>🏔️ Acrophobia Therapy</h1>
      <div></div>
    </div>
    <div class="level-selector">
      <button class="level-btn active" onclick="setLevel(1)">Level 1: Skyscraper Rooftop</button>
      <button class="level-btn" onclick="setLevel(2)">Level 2: Burj Khalifa Summit</button>
      <button class="level-btn" onclick="setLevel(3)">Level 3: Space Elevator</button>
    </div>
  </div>
  <div class="breathing-guide"><div class="breath-circle">Breathe In</div><div class="breath-label">Follow the rhythm</div></div>
  <div class="anxiety-meter"><span class="meter-label">Anxiety</span><div class="meter-track"><div class="meter-fill" style="height:30%"></div></div></div>
  <div class="comfort-msg" style="opacity:0;">You are safe here.</div>

  <a-scene id="vrscene" vr-mode-ui="enabled:true" renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true; logarithmicDepthBuffer:true" fog="type:linear; color:#88bbee; near:100; far:800">
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls wasd-controls="acceleration:30">
        <a-cursor color="#ffa94d" fuse="false" raycaster="far:500"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- LEVEL 1: 50-Story Skyscraper 200m -->
    <a-entity id="level1" visible="true">
      <a-sky color="#5599dd"></a-sky>
      <a-light type="directional" position="50 80 30" color="#fff5e0" intensity="1.8" cast-shadow="true"></a-light>
      <a-light type="ambient" color="#88aacc" intensity="0.35"></a-light>
      <a-light type="hemisphere" color="#87CEEB" groundColor="#444" intensity="0.4"></a-light>
      <!-- Sun -->
      <a-sphere position="50 80 30" radius="5" material="color:#fff; emissive:#fff8e0; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="50 80 30" radius="12" material="color:#fff8a0; opacity:0.15; transparent:true; fog:false; side:double"></a-sphere>
      <!-- Rooftop -->
      <a-box position="0 0 0" width="30" height="0.3" depth="30" material="color:#888; roughness:0.95"></a-box>
      <!-- Thin railing -->
      <a-box position="0 0.4 -15" width="30" height="0.8" depth="0.15" material="color:#666; metalness:0.5"></a-box>
      <a-box position="0 0.4 15" width="30" height="0.8" depth="0.15" material="color:#666; metalness:0.5"></a-box>
      <a-box position="-15 0.4 0" width="0.15" height="0.8" depth="30" material="color:#666; metalness:0.5"></a-box>
      <a-box position="15 0.4 0" width="0.15" height="0.8" depth="30" material="color:#666; metalness:0.5"></a-box>
      <!-- Rooftop structures -->
      <a-box position="8 1.5 8" width="4" height="3" depth="3" material="color:#777"></a-box>
      <a-box position="-6 2 10" width="3" height="4" depth="2.5" material="color:#999"></a-box>
      <a-cylinder position="10 3 -5" radius="0.8" height="4" material="color:#888; metalness:0.3"></a-cylinder>
      <!-- Building going DOWN -->
      <a-box position="0 -100 0" width="30" height="200" depth="30" material="color:#556677; metalness:0.3"></a-box>
      <a-box position="0 -100 -15.1" width="28" height="198" depth="0.1" material="color:#334455; metalness:0.7; opacity:0.8; transparent:true"></a-box>
      <a-box position="15.1 -100 0" width="0.1" height="198" depth="28" material="color:#334455; metalness:0.7; opacity:0.8; transparent:true"></a-box>
      <!-- Ground 200m below -->
      <a-plane position="0 -200 0" rotation="-90 0 0" width="2000" height="2000" material="color:#4a5a3a"></a-plane>
      <!-- Streets -->
      <a-box position="0 -199.9 -30" width="10" height="0.05" depth="2000" material="color:#333"></a-box>
      <a-box position="50 -199.9 0" width="10" height="0.05" depth="2000" material="color:#333"></a-box>
      <!-- Moving cars (specks) -->
      <a-box position="1 -199.5 -50" width="0.3" height="0.15" depth="0.6" material="color:#ffcc00" animation="property:position; to:1 -199.5 -20; dur:15000; loop:true"></a-box>
      <a-box position="3 -199.5 -35" width="0.3" height="0.15" depth="0.6" material="color:#cc2222"></a-box>
      <a-box position="-2 -199.5 -33" width="0.3" height="0.15" depth="0.6" material="color:#2222cc"></a-box>
      <!-- City skyline -->
      <a-box position="-60 -80 -40" width="25" height="240" depth="25" material="color:#667788; metalness:0.6"></a-box>
      <a-box position="70 -50 -60" width="20" height="300" depth="20" material="color:#556677; metalness:0.6"></a-box>
      <a-box position="-40 -70 60" width="22" height="260" depth="22" material="color:#778899; metalness:0.6"></a-box>
      <a-box position="50 -90 50" width="18" height="220" depth="18" material="color:#889999; metalness:0.6"></a-box>
      <a-box position="-80 -60 -80" width="30" height="280" depth="25" material="color:#5a6a7a; metalness:0.6"></a-box>
      <!-- Clouds at eye level -->
      <a-entity position="-80 10 -120" float-anim="amplitude:3; speed:15000">
        <a-sphere radius="15" material="color:#fff; opacity:0.5; transparent:true; fog:false"></a-sphere>
        <a-sphere position="12 2 0" radius="10" material="color:#fff; opacity:0.4; transparent:true; fog:false"></a-sphere>
      </a-entity>
      <!-- Birds circling below -->
      <a-entity position="0 -20 -30" animation="property:rotation; from:0 0 0; to:0 360 0; dur:20000; loop:true; easing:linear">
        <a-text value="v" position="10 0 0" color="#222" scale="0.8 0.8 0.8"></a-text>
        <a-text value="v" position="-8 2 5" color="#222" scale="0.6 0.6 0.6"></a-text>
      </a-entity>
      <!-- Wind streaks -->
      <a-entity animation="property:position; from:-30 2 -8; to:30 3 -12; dur:4000; loop:true; easing:linear">
        <a-box width="3" height="0.01" depth="0.01" material="color:#fff; opacity:0.3; transparent:true"></a-box>
      </a-entity>
      <a-text value="50th Floor Skyscraper - 200m above the streets.\nLook down over the edge. The cars are specks." position="0 3 -8" align="center" color="#ffa94d" scale="0.7 0.7 0.7" face-camera></a-text>
    </a-entity>

    <!-- LEVEL 2: Burj Khalifa 828m -->
    <a-entity id="level2" visible="false">
      <a-sky color="#2255aa"></a-sky>
      <a-light type="directional" position="40 60 20" color="#fff8e0" intensity="2.2" cast-shadow="true"></a-light>
      <a-light type="ambient" color="#6688bb" intensity="0.25"></a-light>
      <a-light type="hemisphere" color="#4488cc" groundColor="#333" intensity="0.3"></a-light>
      <!-- Blazing sun -->
      <a-sphere position="40 60 20" radius="6" material="color:#fff; emissive:#ffffcc; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="40 60 20" radius="15" material="color:#ffffaa; opacity:0.1; transparent:true; fog:false; side:double"></a-sphere>
      <!-- Spire platform -->
      <a-cylinder position="0 0 0" radius="3" height="0.2" material="color:#aaa; metalness:0.7"></a-cylinder>
      <a-cylinder position="0 10 0" radius="0.3" height="20" material="color:#ccc; metalness:0.8"></a-cylinder>
      <!-- Glass railing barely there -->
      <a-cylinder position="0 0.6 0" radius="3" height="1.2" material="color:#aaccee; opacity:0.15; transparent:true; side:double" open-ended="true"></a-cylinder>
      <!-- Tower going down 828m -->
      <a-cylinder position="0 -50 0" radius="4" height="100" material="color:#99aabb; metalness:0.7"></a-cylinder>
      <a-cylinder position="0 -200 0" radius="8" height="200" material="color:#7788aa; metalness:0.6"></a-cylinder>
      <a-cylinder position="0 -500 0" radius="15" height="400" material="color:#667799; metalness:0.6"></a-cylinder>
      <!-- Ground 828m below -->
      <a-plane position="0 -828 0" rotation="-90 0 0" width="5000" height="5000" material="color:#d4c090"></a-plane>
      <!-- Dubai buildings below -->
      <a-box position="80 -780 -100" width="30" height="100" depth="30" material="color:#aab; metalness:0.5"></a-box>
      <a-box position="-60 -790 80" width="25" height="80" depth="25" material="color:#99a; metalness:0.5"></a-box>
      <a-box position="120 -770 50" width="20" height="120" depth="20" material="color:#bbc; metalness:0.5"></a-box>
      <a-box position="-100 -800 -60" width="35" height="60" depth="35" material="color:#aab; metalness:0.5"></a-box>
      <!-- Ocean -->
      <a-plane position="0 -828 -600" rotation="-90 0 0" width="3000" height="1500" material="color:#1a6688; metalness:0.5; opacity:0.9; transparent:true"></a-plane>
      <!-- Clouds FAR BELOW -->
      <a-entity position="100 -400 -200" float-anim="amplitude:5; speed:25000">
        <a-sphere radius="30" material="color:#fff; opacity:0.6; transparent:true; fog:false"></a-sphere>
        <a-sphere position="25 3 5" radius="22" material="color:#fff; opacity:0.5; transparent:true; fog:false"></a-sphere>
      </a-entity>
      <a-entity position="-150 -350 100" float-anim="amplitude:4; speed:30000">
        <a-sphere radius="25" material="color:#fff; opacity:0.5; transparent:true; fog:false"></a-sphere>
        <a-sphere position="18 2 0" radius="18" material="color:#fff; opacity:0.4; transparent:true; fog:false"></a-sphere>
      </a-entity>
      <a-entity position="50 -500 150" float-anim="amplitude:6; speed:20000">
        <a-sphere radius="35" material="color:#fff; opacity:0.4; transparent:true; fog:false"></a-sphere>
      </a-entity>
      <!-- Haze layer -->
      <a-plane position="0 -600 0" rotation="-90 0 0" width="5000" height="5000" material="color:#aabbcc; opacity:0.15; transparent:true; fog:false"></a-plane>
      <!-- Violent wind streaks -->
      <a-entity animation="property:position; from:-40 2 -3; to:40 1 -5; dur:2000; loop:true; easing:linear">
        <a-box width="5" height="0.01" depth="0.01" material="color:#fff; opacity:0.4; transparent:true"></a-box>
      </a-entity>
      <a-entity animation="property:position; from:-35 4 2; to:35 3 0; dur:2500; loop:true; easing:linear">
        <a-box width="4" height="0.01" depth="0.01" material="color:#fff; opacity:0.3; transparent:true"></a-box>
      </a-entity>
      <a-entity animation="property:position; from:-45 1 5; to:45 2 3; dur:1800; loop:true; easing:linear">
        <a-box width="6" height="0.01" depth="0.01" material="color:#fff; opacity:0.25; transparent:true"></a-box>
      </a-entity>
      <a-text value="Burj Khalifa Summit - 828 METERS above Dubai.\nClouds are BELOW you. The ground is almost invisible.\nThe wind screams past you." position="0 3 -2" align="center" color="#ffa94d" scale="0.5 0.5 0.5" face-camera></a-text>
    </a-entity>

    <!-- LEVEL 3: Space Elevator 100km -->
    <a-entity id="level3" visible="false">
      <a-sky color="#000005"></a-sky>
      <a-light type="directional" position="100 50 -50" color="#ffffff" intensity="3" cast-shadow="true"></a-light>
      <a-light type="ambient" color="#112244" intensity="0.1"></a-light>
      <!-- Raw sun in space -->
      <a-sphere position="100 50 -50" radius="8" material="color:#fff; emissive:#ffffff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="100 50 -50" radius="20" material="color:#ffffdd; opacity:0.08; transparent:true; fog:false; side:double"></a-sphere>
      <a-sphere position="100 50 -50" radius="35" material="color:#ffffaa; opacity:0.03; transparent:true; fog:false; side:double"></a-sphere>
      <!-- Glass platform -->
      <a-cylinder position="0 0 0" radius="4" height="0.15" material="color:#88aacc; opacity:0.3; transparent:true; metalness:0.8; side:double"></a-cylinder>
      <!-- Thin cable railing -->
      <a-torus position="0 1 0" radius="4" radius-tubular="0.02" material="color:#ccc; metalness:0.9" rotation="90 0 0"></a-torus>
      <a-cylinder position="4 0.5 0" radius="0.02" height="1" material="color:#ccc; metalness:0.9"></a-cylinder>
      <a-cylinder position="-4 0.5 0" radius="0.02" height="1" material="color:#ccc; metalness:0.9"></a-cylinder>
      <a-cylinder position="0 0.5 4" radius="0.02" height="1" material="color:#ccc; metalness:0.9"></a-cylinder>
      <a-cylinder position="0 0.5 -4" radius="0.02" height="1" material="color:#ccc; metalness:0.9"></a-cylinder>
      <a-cylinder position="2.83 0.5 2.83" radius="0.02" height="1" material="color:#ccc; metalness:0.9"></a-cylinder>
      <a-cylinder position="-2.83 0.5 2.83" radius="0.02" height="1" material="color:#ccc; metalness:0.9"></a-cylinder>
      <a-cylinder position="2.83 0.5 -2.83" radius="0.02" height="1" material="color:#ccc; metalness:0.9"></a-cylinder>
      <a-cylinder position="-2.83 0.5 -2.83" radius="0.02" height="1" material="color:#ccc; metalness:0.9"></a-cylinder>
      <!-- Cable to infinity -->
      <a-cylinder position="0 250 0" radius="0.1" height="500" material="color:#aaa; metalness:0.9"></a-cylinder>
      <a-cylinder position="0 -500 0" radius="0.1" height="1000" material="color:#aaa; metalness:0.9"></a-cylinder>
      <!-- EARTH below with curvature -->
      <a-sphere position="0 -6471 0" radius="6371" material="color:#1a5588; fog:false"></a-sphere>
      <a-sphere position="30 -6470 -20" radius="80" material="color:#3a7a3a; opacity:0.8; transparent:true; fog:false"></a-sphere>
      <a-sphere position="-50 -6470 40" radius="60" material="color:#4a8a2a; opacity:0.7; transparent:true; fog:false"></a-sphere>
      <a-sphere position="10 -6470 60" radius="45" material="color:#d4c090; opacity:0.6; transparent:true; fog:false"></a-sphere>
      <!-- Cloud layer -->
      <a-sphere position="0 -6360 0" radius="6362" material="color:#ffffff; opacity:0.2; transparent:true; fog:false"></a-sphere>
      <!-- Atmosphere glow -->
      <a-sphere position="0 -6471 0" radius="6381" material="color:#4488ff; opacity:0.08; transparent:true; fog:false; side:back"></a-sphere>
      <a-sphere position="0 -6471 0" radius="6385" material="color:#2266dd; opacity:0.05; transparent:true; fog:false; side:back"></a-sphere>
      <!-- Stars everywhere -->
      <a-sphere position="50 40 -80" radius="0.15" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-70 60 -50" radius="0.1" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="30 80 40" radius="0.12" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-40 30 70" radius="0.08" material="color:#ffd; emissive:#ffd; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="80 55 -20" radius="0.13" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-20 90 -60" radius="0.09" material="color:#ddf; emissive:#ddf; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="60 20 60" radius="0.11" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-80 45 25" radius="0.14" material="color:#ffd; emissive:#ffd; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="10 70 -90" radius="0.1" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-55 85 -35" radius="0.07" material="color:#ddf; emissive:#ddf; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="45 15 -70" radius="0.16" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-30 50 80" radius="0.08" material="color:#ffd; emissive:#ffd; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="90 75 10" radius="0.12" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-65 25 -55" radius="0.1" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="25 95 30" radius="0.09" material="color:#ddf; emissive:#ddf; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-45 65 45" radius="0.13" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="75 10 -40" radius="0.11" material="color:#ffd; emissive:#ffd; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-15 80 -80" radius="0.08" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="55 50 55" radius="0.15" material="color:#fff; emissive:#fff; emissiveIntensity:1; fog:false"></a-sphere>
      <a-sphere position="-85 35 -15" radius="0.1" material="color:#ddf; emissive:#ddf; emissiveIntensity:1; fog:false"></a-sphere>
      <!-- Moon -->
      <a-sphere position="-200 80 -300" radius="15" material="color:#ddd; emissive:#aaa; emissiveIntensity:0.2; fog:false"></a-sphere>
      <!-- Satellite passing -->
      <a-entity animation="property:position; from:60 10 -80; to:-60 15 80; dur:30000; loop:true; easing:linear">
        <a-box width="0.5" height="0.1" depth="0.1" material="color:#ccc; metalness:0.9; fog:false"></a-box>
        <a-box position="-0.5 0 0" width="0.8" height="0.01" depth="0.3" material="color:#224488; metalness:0.8; fog:false"></a-box>
        <a-box position="0.5 0 0" width="0.8" height="0.01" depth="0.3" material="color:#224488; metalness:0.8; fog:false"></a-box>
      </a-entity>
      <a-text value="SPACE ELEVATOR - 100km above Earth.\nYou see the curvature of the planet.\nGlass floor reveals the infinite void below.\nNo ground. Only the abyss." position="0 3 -3" align="center" color="#ffa94d" scale="0.45 0.45 0.45" face-camera></a-text>
    </a-entity>
  </a-scene>

  <script src="shared.js"></script>
  <script>
    var altitudes = { 1: '200m', 2: '828m', 3: '100km' };
    function setLevel(num) {
      document.getElementById('level1').setAttribute('visible', num === 1);
      document.getElementById('level2').setAttribute('visible', num === 2);
      document.getElementById('level3').setAttribute('visible', num === 3);
      var rig = document.getElementById('rig');
      var scene = document.getElementById('vrscene');
      var wind = document.getElementById('wind-overlay');
      var vertigo = document.getElementById('vertigo-overlay');
      if (num === 1) { rig.setAttribute('position','0 1.6 8'); scene.setAttribute('fog','type:linear; color:#88bbee; near:100; far:800'); wind.style.opacity='0.3'; vertigo.style.opacity='0.2'; }
      if (num === 2) { rig.setAttribute('position','0 1.6 0'); scene.setAttribute('fog','type:linear; color:#6688bb; near:200; far:1500'); wind.style.opacity='0.6'; vertigo.style.opacity='0.5'; }
      if (num === 3) { rig.setAttribute('position','0 1.6 0'); scene.setAttribute('fog','type:linear; color:#000005; near:500; far:10000'); wind.style.opacity='0'; vertigo.style.opacity='0.7'; }
      document.getElementById('alt-display').textContent = altitudes[num];
      document.querySelectorAll('.level-btn').forEach(function(btn, i) { btn.classList.toggle('active', i === num - 1); });
      showComfortMessage();
    }
    window.addEventListener('load', function() { initPhobiaScene(); initVRPhobiaApp(); setLevel(1); });
  </script>
</body>
</html>
