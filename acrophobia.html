<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acrophobia — PhobiaVR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    #height-indicator{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:100;color:#ffa94d;font-family:Inter,sans-serif;font-size:14px;text-align:right;pointer-events:none;text-shadow:0 0 10px rgba(255,169,77,0.8)}
    #height-indicator .height-val{font-size:28px;font-weight:800;display:block}
    #wind-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;opacity:0;transition:opacity 1s}
    #vertigo-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;opacity:0;transition:opacity 2s;background:radial-gradient(ellipse at center,transparent 30%,rgba(0,0,0,0.5) 100%)}
    @keyframes screenShake{0%{transform:translate(0,0)}25%{transform:translate(-3px,2px)}50%{transform:translate(2px,-3px)}75%{transform:translate(-2px,3px)}100%{transform:translate(0,0)}}
    #lift-overlay{position:fixed;bottom:28%;left:50%;transform:translateX(-50%);z-index:52;pointer-events:none;text-align:center;transition:opacity 0.5s;opacity:0}
    #lift-overlay .lift-arrow{color:#ffa94d;font-size:36px;display:block;animation:liftPulse 1s ease-in-out infinite;text-shadow:0 0 20px rgba(255,169,77,0.8)}
    #lift-overlay .lift-text{color:#ffa94d;font-family:Inter,sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;text-shadow:0 0 12px rgba(255,169,77,0.6)}
    @keyframes liftPulse{0%,100%{transform:translateY(4px);opacity:0.3}50%{transform:translateY(-4px);opacity:1}}
    #fall-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:60;pointer-events:none;opacity:0;transition:opacity 0.2s;background:linear-gradient(to bottom,rgba(255,0,0,0.15),rgba(0,0,0,0.8))}
    #fall-overlay .fall-text{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#ff3333;font-family:Inter,sans-serif;font-size:42px;font-weight:900;letter-spacing:8px;text-shadow:0 0 30px rgba(255,0,0,0.7);animation:fallPulse 0.3s ease-in-out infinite}
    #fall-overlay .fall-alt{position:absolute;top:55%;left:50%;transform:translateX(-50%);color:#ffa94d;font-family:Inter,sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-shadow:0 0 12px rgba(255,169,77,0.8)}
    @keyframes fallPulse{0%,100%{opacity:1;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.6;transform:translate(-50%,-50%) scale(1.05)}}
  </style>
</head>
<body>
  <div id="height-indicator"><span class="height-val" id="alt-display">300m</span>above ground</div>
  <div id="wind-overlay"></div>
  <div id="vertigo-overlay"></div>
  <div id="lift-overlay"><span class="lift-arrow">▲</span><span class="lift-text">ASCENDING</span></div>
  <div id="fall-overlay"><div class="fall-text">FALLING</div><div class="fall-alt" id="fall-alt">300m</div></div>
  <div class="scene-ui">
    <div class="scene-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>🏔️ Acrophobia Therapy</h1>
      <div></div>
    </div>
    <div class="level-selector">
      <button class="level-btn active" onclick="setLevel(1)">Level 1: Collapsing Skyscraper</button>
      <button class="level-btn" onclick="setLevel(2)">Level 2: Volcano Rim</button>
      <button class="level-btn" onclick="setLevel(3)">Level 3: Orbital Freefall</button>
    </div>
  </div>
  <div class="breathing-guide"><div class="breath-circle">Breathe In</div><div class="breath-label">Follow the rhythm</div></div>
  <div class="anxiety-meter"><span class="meter-label">Anxiety</span><div class="meter-track"><div class="meter-fill" style="height:30%"></div></div></div>
  <div class="comfort-msg" style="opacity:0;">You are safe here.</div>

  <a-scene id="vrscene" vr-mode-ui="enabled:true" renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true; logarithmicDepthBuffer:true" fog="type:linear; color:#8899aa; near:80; far:600">
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls wasd-controls="acceleration:30">
        <a-cursor color="#ffa94d" fuse="false" raycaster="far:500"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- ======= LEVEL 1: Collapsing Skyscraper 300m ======= -->
    <a-entity id="level1" visible="true">
      <a-sky color="#778899"></a-sky>
      <a-light type="directional" position="40 60 20" color="#fff5e0" intensity="1.5" cast-shadow="true"></a-light>
      <a-light type="ambient" color="#99aabb" intensity="0.35"></a-light>
      <a-light type="hemisphere" color="#aabbcc" groundColor="#555" intensity="0.3"></a-light>
      <!-- Overcast sun -->
      <a-sphere position="40 60 20" radius="4" material="color:#fff; emissive:#ffe8c0; emissiveIntensity:0.8; fog:false"></a-sphere>

      <!-- Cracked rooftop platform -->
      <a-box position="0 0 0" width="28" height="0.3" depth="28" material="color:#777; roughness:0.95"></a-box>
      <!-- Crack lines across floor -->
      <a-box position="-3 0.16 2" width="14" height="0.02" depth="0.08" material="color:#333" rotation="0 15 0"></a-box>
      <a-box position="4 0.16 -3" width="10" height="0.02" depth="0.06" material="color:#333" rotation="0 -25 0"></a-box>
      <a-box position="1 0.16 5" width="12" height="0.02" depth="0.05" material="color:#333" rotation="0 40 0"></a-box>
      <a-box position="-5 0.16 -7" width="8" height="0.02" depth="0.07" material="color:#444" rotation="0 -60 0"></a-box>

      <!-- Gaping hole in floor -->
      <a-box position="9 -0.2 -7" width="6" height="0.4" depth="5" material="color:#222; side:back"></a-box>

      <!-- Rebar sticking out of edges -->
      <a-cylinder position="-13.8 0.5 -5" radius="0.03" height="1.8" material="color:#8B4513; metalness:0.7" rotation="15 0 10"></a-cylinder>
      <a-cylinder position="-13.6 0.3 -3" radius="0.03" height="1.2" material="color:#8B4513; metalness:0.7" rotation="-10 0 25"></a-cylinder>
      <a-cylinder position="13.5 0.4 3" radius="0.03" height="1" material="color:#8B4513; metalness:0.7" rotation="20 0 -15"></a-cylinder>
      <a-cylinder position="5 0.3 -13.8" radius="0.03" height="1.5" material="color:#8B4513; metalness:0.7" rotation="-5 0 30"></a-cylinder>

      <!-- Broken railing (partial, only one side) -->
      <a-box position="-5 0.5 -13.8" width="12" height="1" depth="0.1" material="color:#666; metalness:0.5"></a-box>
      <a-box position="10 0.3 -13.8" width="3" height="0.5" depth="0.1" material="color:#666; metalness:0.5" rotation="0 0 -25"></a-box>
      <!-- All other sides: NO railing -->

      <!-- Rooftop structures (damaged) -->
      <a-box position="-8 1.5 8" width="4" height="3" depth="3" material="color:#666"></a-box>
      <a-box position="-8 3.2 8" width="3.5" height="0.5" depth="2.8" material="color:#555" rotation="0 0 8"></a-box>
      <!-- HVAC unit toppled -->
      <a-box position="7 0.4 9" width="2" height="1.5" depth="2" material="color:#888; metalness:0.4" rotation="0 0 35"></a-box>

      <!-- Building going DOWN 300m -->
      <a-box position="0 -150 0" width="28" height="300" depth="28" material="color:#556677; metalness:0.3"></a-box>
      <!-- Glass facade -->
      <a-box position="0 -100 -14.1" width="27" height="260" depth="0.1" material="color:#334455; metalness:0.8; opacity:0.7; transparent:true"></a-box>
      <a-box position="14.1 -100 0" width="0.1" height="260" depth="27" material="color:#334455; metalness:0.8; opacity:0.7; transparent:true"></a-box>
      <a-box position="-14.1 -100 0" width="0.1" height="260" depth="27" material="color:#334455; metalness:0.8; opacity:0.7; transparent:true"></a-box>

      <!-- Falling debris (animated) -->
      <a-box position="-4 5 -8" width="0.8" height="0.3" depth="0.6" material="color:#888"
             animation="property:position; to:-6 -300 -12; dur:7000; loop:true; easing:easeInQuad"
             animation__rot="property:rotation; from:0 0 0; to:120 250 80; dur:7000; loop:true"></a-box>
      <a-box position="6 3 5" width="0.5" height="0.2" depth="0.4" material="color:#777"
             animation="property:position; to:8 -300 3; dur:9000; loop:true; easing:easeInQuad; delay:2000"
             animation__rot="property:rotation; from:0 0 0; to:90 180 45; dur:9000; loop:true; delay:2000"></a-box>
      <a-sphere position="2 4 -10" radius="0.2" material="color:#999"
               animation="property:position; to:3 -300 -14; dur:5000; loop:true; easing:easeInQuad; delay:4000"></a-sphere>
      <a-box position="-8 6 2" width="1.2" height="0.5" depth="0.8" material="color:#666"
             animation="property:position; to:-10 -300 -2; dur:11000; loop:true; easing:easeInQuad; delay:6000"
             animation__rot="property:rotation; from:0 0 0; to:200 90 150; dur:11000; loop:true; delay:6000"></a-box>

      <!-- Ground 300m below -->
      <a-plane position="0 -300 0" rotation="-90 0 0" width="4000" height="4000" material="color:#4a5a3a"></a-plane>
      <!-- Streets grid -->
      <a-box position="0 -299.9 -50" width="14" height="0.05" depth="4000" material="color:#333"></a-box>
      <a-box position="70 -299.9 0" width="14" height="0.05" depth="4000" material="color:#333"></a-box>
      <a-box position="-70 -299.9 0" width="14" height="0.05" depth="4000" material="color:#333"></a-box>
      <a-box position="0 -299.9 0" width="4000" height="0.05" depth="14" material="color:#333"></a-box>

      <!-- Flashing emergency vehicles far below -->
      <a-box position="5 -299 -20" width="0.5" height="0.25" depth="1" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0"
             animation="property:material.emissiveIntensity; from:0; to:0.8; dur:500; dir:alternate; loop:true"></a-box>
      <a-box position="8 -299 -22" width="0.5" height="0.25" depth="1" material="color:#0000ff; emissive:#0000ff; emissiveIntensity:0"
             animation="property:material.emissiveIntensity; from:0.8; to:0; dur:500; dir:alternate; loop:true"></a-box>
      <a-box position="-3 -299 -18" width="0.5" height="0.25" depth="1" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0"
             animation="property:material.emissiveIntensity; from:0; to:0.6; dur:600; dir:alternate; loop:true"></a-box>

      <!-- Massive city skyline -->
      <a-box position="-90 -80 -60" width="35" height="440" depth="35" material="color:#667788; metalness:0.5"></a-box>
      <a-box position="100 -60 -80" width="28" height="480" depth="28" material="color:#556677; metalness:0.5"></a-box>
      <a-box position="-60 -120 80" width="32" height="360" depth="32" material="color:#778899; metalness:0.5"></a-box>
      <a-box position="70 -140 70" width="24" height="320" depth="24" material="color:#889999; metalness:0.5"></a-box>
      <a-box position="-120 -70 -110" width="40" height="460" depth="35" material="color:#5a6a7a; metalness:0.5"></a-box>
      <a-box position="140 -100 -40" width="22" height="400" depth="22" material="color:#6a7a8a; metalness:0.5"></a-box>
      <a-box position="-40 -150 -140" width="45" height="300" depth="40" material="color:#7788aa; metalness:0.5"></a-box>
      <a-box position="50 -130 140" width="30" height="340" depth="30" material="color:#667799; metalness:0.5"></a-box>
      <a-box position="160 -90 60" width="26" height="420" depth="26" material="color:#5a7a8a; metalness:0.5"></a-box>
      <a-box position="-150 -110 50" width="33" height="380" depth="28" material="color:#6a8899; metalness:0.5"></a-box>

      <!-- Helicopter circling building -->
      <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; dur:20000; loop:true; easing:linear">
        <a-entity position="35 8 0">
          <a-box width="1.8" height="0.6" depth="0.6" material="color:#333"></a-box>
          <a-box position="-1 0 0" width="1.5" height="0.2" depth="0.2" material="color:#555"></a-box>
          <a-cylinder position="0 0.5 0" radius="2" height="0.05" material="color:#555; opacity:0.5; transparent:true"
                      animation="property:rotation; from:0 0 0; to:0 360 0; dur:150; loop:true; easing:linear"></a-cylinder>
        </a-entity>
      </a-entity>

      <!-- Storm clouds approaching -->
      <a-entity position="-70 40 -100">
        <a-sphere radius="30" material="color:#445566; opacity:0.6; transparent:true; fog:false"></a-sphere>
        <a-sphere position="25 -5 10" radius="22" material="color:#445566; opacity:0.5; transparent:true; fog:false"></a-sphere>
        <a-sphere position="-15 3 15" radius="18" material="color:#3a4a5a; opacity:0.4; transparent:true; fog:false"></a-sphere>
      </a-entity>
      <a-entity position="60 35 -120">
        <a-sphere radius="25" material="color:#3a4a55; opacity:0.5; transparent:true; fog:false"></a-sphere>
        <a-sphere position="18 2 8" radius="20" material="color:#3a4a55; opacity:0.4; transparent:true; fog:false"></a-sphere>
      </a-entity>

      <!-- Violent wind streaks -->
      <a-entity animation="property:position; from:-40 2 -5; to:40 3 -8; dur:2200; loop:true; easing:linear">
        <a-box width="6" height="0.01" depth="0.01" material="color:#fff; opacity:0.4; transparent:true"></a-box>
      </a-entity>
      <a-entity animation="property:position; from:-35 5 3; to:35 4 1; dur:1800; loop:true; easing:linear">
        <a-box width="5" height="0.01" depth="0.01" material="color:#fff; opacity:0.3; transparent:true"></a-box>
      </a-entity>
      <a-entity animation="property:position; from:-45 1 8; to:45 2 5; dur:1500; loop:true; easing:linear">
        <a-box width="7" height="0.01" depth="0.01" material="color:#fff; opacity:0.25; transparent:true"></a-box>
      </a-entity>
      <a-entity animation="property:position; from:40 7 -3; to:-40 6 -6; dur:2000; loop:true; easing:linear">
        <a-box width="4" height="0.01" depth="0.01" material="color:#fff; opacity:0.2; transparent:true"></a-box>
      </a-entity>

      <!-- Cloud layers encountered during ascent -->
      <a-sphere position="-20 -180 -15" radius="22" material="color:#bbc; opacity:0.14; transparent:true; fog:false"></a-sphere>
      <a-sphere position="15 -170 10" radius="18" material="color:#ccd; opacity:0.12; transparent:true; fog:false"></a-sphere>
      <a-sphere position="5 -160 -20" radius="25" material="color:#aab; opacity:0.1; transparent:true; fog:false"></a-sphere>
      <a-sphere position="-10 -100 12" radius="20" material="color:#dde; opacity:0.1; transparent:true; fog:false"></a-sphere>
      <a-sphere position="18 -90 -10" radius="15" material="color:#bbc; opacity:0.08; transparent:true; fog:false"></a-sphere>
      <a-sphere position="-25 -140 5" radius="16" material="color:#ccc; opacity:0.11; transparent:true; fog:false"></a-sphere>

      <a-text value="COLLAPSING SKYSCRAPER — 300m up.\nThe floor is cracking. Debris falls into the void.\nNo complete railing. The building groans and shifts.\nLook down through the hole in the floor." position="0 3.5 -6" align="center" color="#ffa94d" scale="0.55 0.55 0.55" face-camera></a-text>
    </a-entity>

    <!-- ======= LEVEL 2: Active Volcano Rim — 3,700m ======= -->
    <a-entity id="level2" visible="false">
      <a-sky color="#1a0800"></a-sky>
      <a-light type="ambient" color="#ff4400" intensity="0.15"></a-light>
      <a-light type="point" position="0 -200 0" color="#ff3300" intensity="3" distance="500"></a-light>
      <a-light type="point" position="0 -100 0" color="#ff6600" intensity="2" distance="300"></a-light>
      <a-light type="directional" position="30 40 20" color="#ffaa66" intensity="0.5"></a-light>

      <!-- Volcano rim (irregular rocky ring) -->
      <a-torus position="0 0 0" radius="22" radius-tubular="5" material="color:#2a1a0a; roughness:1" rotation="90 0 0" segments-tubular="24" segments-radial="12"></a-torus>
      <!-- Standing platform -->
      <a-box position="0 -1 20" width="8" height="2.5" depth="5" material="color:#3a2510; roughness:1"></a-box>
      <a-box position="4 -0.5 19" width="3" height="1.8" depth="3" material="color:#2a1a08; roughness:1"></a-box>
      <a-box position="-3 -0.8 21" width="2.5" height="1.2" depth="2.5" material="color:#4a3015; roughness:1"></a-box>
      <a-sphere position="6 -0.2 18" radius="1" material="color:#3a2010; roughness:1"></a-sphere>
      <a-sphere position="-5 -0.3 19" radius="0.8" material="color:#2a1508; roughness:1"></a-sphere>

      <!-- Lava lake 400m below -->
      <a-circle position="0 -400 0" radius="20" rotation="-90 0 0" material="color:#ff3300; emissive:#ff4400; emissiveIntensity:0.8"
                animation="property:material.emissiveIntensity; from:0.5; to:1; dur:3000; dir:alternate; loop:true"></a-circle>
      <a-circle position="0 -399 0" radius="22" rotation="-90 0 0" material="color:#ff6600; opacity:0.3; transparent:true; emissive:#ff4400; emissiveIntensity:0.5"></a-circle>
      <!-- Lava rivers on surface -->
      <a-box position="5 -398 -3" width="1.5" height="0.1" depth="8" material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.6"
             animation="property:material.emissiveIntensity; from:0.4; to:0.9; dur:2000; dir:alternate; loop:true"></a-box>
      <a-box position="-4 -398 5" width="1" height="0.1" depth="6" material="color:#ff4400; emissive:#ff2200; emissiveIntensity:0.5" rotation="0 30 0"
             animation="property:material.emissiveIntensity; from:0.3; to:0.8; dur:2500; dir:alternate; loop:true"></a-box>

      <!-- Inner caldera walls -->
      <a-cylinder position="0 -200 0" radius="21" height="400" material="color:#1a0a04; roughness:1; side:back" open-ended="true"></a-cylinder>

      <!-- Volcanic rocks -->
      <a-sphere position="7 0.2 17" radius="1" material="color:#2a1508; roughness:1"></a-sphere>
      <a-sphere position="-6 -0.3 18" radius="0.6" material="color:#3a2010; roughness:1"></a-sphere>
      <a-sphere position="2 0.3 16" radius="0.8" material="color:#1a0a04; roughness:1"></a-sphere>
      <a-box position="-2 0 15" width="2" height="1" depth="1.5" material="color:#2a1a08; roughness:1" rotation="10 20 5"></a-box>

      <!-- Rising lava bubbles -->
      <a-sphere position="3 -380 -5" radius="1.5" material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.8"
                animation="property:position; from:3 -380 -5; to:5 -280 -3; dur:6000; loop:true; easing:easeOutQuad"
                animation__pop="property:scale; from:1 1 1; to:0.1 0.1 0.1; dur:6000; loop:true; easing:easeInQuad"></a-sphere>
      <a-sphere position="-5 -390 8" radius="1.2" material="color:#ff6600; emissive:#ff4400; emissiveIntensity:0.7"
                animation="property:position; from:-5 -390 8; to:-3 -300 6; dur:8000; loop:true; easing:easeOutQuad; delay:2000"
                animation__pop="property:scale; from:1 1 1; to:0.1 0.1 0.1; dur:8000; loop:true; easing:easeInQuad; delay:2000"></a-sphere>
      <a-sphere position="0 -370 0" radius="2" material="color:#ff4400; emissive:#ff2200; emissiveIntensity:0.9"
                animation="property:position; from:0 -370 0; to:2 -260 -2; dur:10000; loop:true; easing:easeOutQuad; delay:4000"
                animation__pop="property:scale; from:1 1 1; to:0.1 0.1 0.1; dur:10000; loop:true; easing:easeInQuad; delay:4000"></a-sphere>

      <!-- Smoke columns rising -->
      <a-sphere position="10 3 12" radius="3" material="color:#554433; opacity:0.2; transparent:true"
                animation="property:position; from:10 3 12; to:14 40 10; dur:12000; loop:true"
                animation__fade="property:material.opacity; from:0.2; to:0; dur:12000; loop:true"></a-sphere>
      <a-sphere position="-8 2 14" radius="2.5" material="color:#665544; opacity:0.15; transparent:true"
                animation="property:position; from:-8 2 14; to:-5 35 16; dur:10000; loop:true; delay:3000"
                animation__fade="property:material.opacity; from:0.15; to:0; dur:10000; loop:true; delay:3000"></a-sphere>
      <a-sphere position="3 4 22" radius="4" material="color:#443322; opacity:0.2; transparent:true"
                animation="property:position; from:3 4 22; to:1 50 24; dur:15000; loop:true; delay:5000"
                animation__fade="property:material.opacity; from:0.2; to:0; dur:15000; loop:true; delay:5000"></a-sphere>
      <a-sphere position="-3 5 16" radius="2" material="color:#554433; opacity:0.18; transparent:true"
                animation="property:position; from:-3 5 16; to:-1 30 18; dur:9000; loop:true; delay:7000"
                animation__fade="property:material.opacity; from:0.18; to:0; dur:9000; loop:true; delay:7000"></a-sphere>

      <!-- Outer mountain slope -->
      <a-cone position="0 -600 0" radius-bottom="900" radius-top="24" height="1200" material="color:#3a2a15; roughness:1; side:double" open-ended="true"></a-cone>
      <!-- Distant landscape -->
      <a-plane position="0 -900 0" rotation="-90 0 0" width="8000" height="8000" material="color:#2a4a2a"></a-plane>

      <!-- Glowing cracks in rock near edge -->
      <a-box position="2 -0.7 17" width="4" height="0.02" depth="0.12" material="color:#ff4400; emissive:#ff2200; emissiveIntensity:0.6" rotation="0 20 0"
             animation="property:material.emissiveIntensity; from:0.3; to:0.9; dur:2000; dir:alternate; loop:true"></a-box>
      <a-box position="-1 -0.7 19" width="3" height="0.02" depth="0.1" material="color:#ff5500; emissive:#ff3300; emissiveIntensity:0.5" rotation="0 -30 0"
             animation="property:material.emissiveIntensity; from:0.2; to:0.8; dur:2500; dir:alternate; loop:true"></a-box>
      <a-box position="4 -0.6 15.5" width="2.5" height="0.02" depth="0.08" material="color:#ff3300; emissive:#ff1100; emissiveIntensity:0.4" rotation="0 50 0"
             animation="property:material.emissiveIntensity; from:0.2; to:0.7; dur:3000; dir:alternate; loop:true"></a-box>

      <!-- Heat shimmer -->
      <a-plane position="0 8 0" rotation="-90 0 0" width="50" height="50" material="color:#ff4400; opacity:0.03; transparent:true"

  <script src="shared.js"></script>
  <script>
    var altitudes = { 1: '300m', 2: '3,700m', 3: '400km' };
    var liftAnim = null;
    var currentLevel = 0;

    function setLevel(num) {
      if (liftAnim) { cancelAnimationFrame(liftAnim); liftAnim = null; }
      currentLevel = num;

      document.getElementById('level1').setAttribute('visible', num === 1);
      document.getElementById('level2').setAttribute('visible', num === 2);
      document.getElementById('level3').setAttribute('visible', num === 3);
      document.querySelectorAll('.level-btn').forEach(function(btn, i) {
        btn.classList.toggle('active', i === num - 1);
      });

      var rig = document.getElementById('rig');
      var scene = document.getElementById('vrscene');
      var wind = document.getElementById('wind-overlay');
      var vertigo = document.getElementById('vertigo-overlay');
      var altDisplay = document.getElementById('alt-display');
      var liftEl = document.getElementById('lift-overlay');

      // Lift configs: camera starts at ground, rises to destination
      var configs = {
        1: { startY:-298, endY:1.6, startZ:16, endZ:5, maxAlt:300, unit:'m', dur:7000, endWind:0.35, endVertigo:0.25 },
        2: { startY:-350, endY:1.6, startZ:20, endZ:20, maxAlt:3700, unit:'m', dur:9000, endWind:0.5, endVertigo:0.5 },
        3: { startY:-150, endY:1.6, startZ:0, endZ:0, maxAlt:400, unit:'km', dur:14000, endWind:0, endVertigo:0.7 }
      };
      var c = configs[num];

      // Start at ground level
      rig.setAttribute('position', '0 ' + c.startY + ' ' + c.startZ);
      wind.style.opacity = '0';
      vertigo.style.opacity = '0';
      altDisplay.textContent = '0m';
      liftEl.style.opacity = '1';

      // Ground-level fog
      if (num === 1) scene.setAttribute('fog', 'type:linear; color:#aabbcc; near:5; far:120');
      if (num === 2) scene.setAttribute('fog', 'type:linear; color:#2a3a2a; near:5; far:150');
      if (num === 3) scene.setAttribute('fog', 'type:linear; color:#6699bb; near:8; far:120');

      var startTime = performance.now();

      function step(now) {
        var t = Math.min((now - startTime) / c.dur, 1);
        // easeInOutCubic: slow takeoff, fast middle, gentle arrival
        var e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2;

        // Interpolate position
        var y = c.startY + (c.endY - c.startY) * e;
        var z = c.startZ + (c.endZ - c.startZ) * e;
        rig.setAttribute('position', '0 ' + y.toFixed(2) + ' ' + z.toFixed(2));

        // Live altitude counter
        var alt = c.maxAlt * e;
        if (c.unit === 'km') {
          altDisplay.textContent = alt < 1 ? Math.round(alt * 1000).toLocaleString() + 'm' : alt.toFixed(1) + 'km';
        } else {
          altDisplay.textContent = Math.round(alt).toLocaleString() + 'm';
        }

        // Progressive wind & vertigo
        wind.style.opacity = (c.endWind * e).toFixed(3);
        vertigo.style.opacity = (c.endVertigo * e).toFixed(3);

        // Level 1: fog clears as you rise above city haze
        if (num === 1) {
          var fogNear = 5 + 75 * e, fogFar = 120 + 480 * e;
          scene.setAttribute('fog', 'type:linear; color:#8899aa; near:' + fogNear.toFixed(0) + '; far:' + fogFar.toFixed(0));
        }
        // Level 2: fog transitions from green mountain to volcanic red
        if (num === 2) {
          var r2 = Math.round(42 - 16*e), g2 = Math.round(58 - 50*e), b2 = Math.round(42 - 42*e);
          scene.setAttribute('fog', 'type:linear; color:rgb('+r2+','+g2+','+b2+'); near:'+(5+45*e).toFixed(0)+'; far:'+(150+250*e).toFixed(0));
        }
        // Level 3: sky transitions blue → dark → space
        if (num === 3) {
          var sky3 = document.querySelector('#level3 a-sky');
          if (t < 0.15) sky3.setAttribute('color', '#6699cc');
          else if (t < 0.3) sky3.setAttribute('color', '#3366aa');
          else if (t < 0.45) sky3.setAttribute('color', '#1a3377');
          else if (t < 0.6) sky3.setAttribute('color', '#0a1a44');
          else if (t < 0.75) sky3.setAttribute('color', '#050a22');
          else sky3.setAttribute('color', '#000002');
          scene.setAttribute('fog','type:linear; color:#000005; near:'+(8+192*e).toFixed(0)+'; far:'+(120+7880*e).toFixed(0));
        }

        // Fade out ascending indicator near end
        if (t > 0.85) liftEl.style.opacity = ((1 - t) / 0.15).toFixed(3);

        if (t < 1) {
          liftAnim = requestAnimationFrame(step);
        } else {
          // Arrived at destination
          liftAnim = null;
          liftEl.style.opacity = '0';
          altDisplay.textContent = altitudes[num];
          if (num === 1) scene.setAttribute('fog','type:linear; color:#8899aa; near:80; far:600');
          if (num === 2) scene.setAttribute('fog','type:linear; color:#1a0800; near:50; far:400');
          if (num === 3) scene.setAttribute('fog','type:linear; color:#000002; near:200; far:8000');
          showComfortMessage();
        }
      }

      liftAnim = requestAnimationFrame(step);
    }

    // ===== FALLING SYSTEM =====
    var isFalling = false;
    var fallAnim = null;
    var platformBounds = {
      1: { minX:-13.5, maxX:13.5, minZ:-13.5, maxZ:13.5, groundY:-300, label:'300m' },
      2: { minX:-7, maxX:9, minZ:13, maxZ:24, groundY:-900, label:'3,700m' },
      3: { minX:-5.5, maxX:5.5, minZ:-7.5, maxZ:7.5, groundY:-6771, label:'400km' }
    };

    function triggerFall() {
      if (isFalling || liftAnim) return;
      isFalling = true;
      var rig = document.getElementById('rig');
      var fallEl = document.getElementById('fall-overlay');
      var fallAltEl = document.getElementById('fall-alt');
      var altDisplay = document.getElementById('alt-display');
      var wind = document.getElementById('wind-overlay');
      var vertigo = document.getElementById('vertigo-overlay');
      var bounds = platformBounds[currentLevel];
      fallEl.style.opacity = '1';
      wind.style.opacity = '0.8';
      vertigo.style.opacity = '0.9';

      var pos = rig.getAttribute('position');
      var startY = pos.y;
      var startX = pos.x;
      var startZ = pos.z;
      var totalDrop = startY - bounds.groundY;
      var fallDur = currentLevel === 3 ? 12000 : (currentLevel === 2 ? 8000 : 5000);
      var startTime = performance.now();

      function fallStep(now) {
        var t = Math.min((now - startTime) / fallDur, 1);
        // easeInQuad: accelerating fall (gravity)
        var e = t * t;
        var y = startY - totalDrop * e;
        // slight drift
        var x = startX + Math.sin(t * 8) * 0.3;
        var z = startZ + Math.cos(t * 6) * 0.2;
        rig.setAttribute('position', x.toFixed(2) + ' ' + y.toFixed(2) + ' ' + z.toFixed(2));

        // Live altitude counter (decreasing)
        var remainAlt;
        if (currentLevel === 3) {
          var km = (1 - e) * 400;
          fallAltEl.textContent = km > 1 ? km.toFixed(1) + 'km' : Math.round(km*1000) + 'm';
          altDisplay.textContent = fallAltEl.textContent;
        } else {
          var maxM = currentLevel === 1 ? 300 : 3700;
          remainAlt = Math.round(maxM * (1 - e));
          fallAltEl.textContent = remainAlt.toLocaleString() + 'm';
          altDisplay.textContent = fallAltEl.textContent;
        }

        // Screen shake intensifies
        if (Math.random() < 0.3) {
          vertigo.style.animation = 'screenShake 0.15s ease';
          setTimeout(function(){ vertigo.style.animation = ''; }, 150);
        }

        if (t < 1) {
          fallAnim = requestAnimationFrame(fallStep);
        } else {
          // Impact — flash red then reset
          fallEl.style.background = 'rgba(200,0,0,0.6)';
          vertigo.style.opacity = '1';
          setTimeout(function() {
            fallEl.style.opacity = '0';
            fallEl.style.background = '';
            isFalling = false;
            fallAnim = null;
            // Reset — re-lift from ground
            setLevel(currentLevel);
          }, 1800);
        }
      }
      fallAnim = requestAnimationFrame(fallStep);
    }

    // Edge detection loop — runs every 200ms after lift completes
    setInterval(function() {
      if (isFalling || liftAnim || !currentLevel) return;
      var rig = document.getElementById('rig');
      var pos = rig.getAttribute('position');
      var b = platformBounds[currentLevel];
      if (pos.x < b.minX || pos.x > b.maxX || pos.z < b.minZ || pos.z > b.maxZ) {
        triggerFall();
      }
    }, 200);

    // Periodic building shake for Level 1 (only after arrival)
    (function shakeLoop() {
      setTimeout(function() {
        if (currentLevel === 1 && !liftAnim && !isFalling) {
          document.getElementById('vertigo-overlay').style.animation = 'screenShake 0.6s ease';
          setTimeout(function() { document.getElementById('vertigo-overlay').style.animation = ''; }, 600);
        }
        shakeLoop();
      }, 7000 + Math.random() * 5000);
    })();

    window.addEventListener('load', function() { initPhobiaScene(); initVRPhobiaApp(); setLevel(1); });
  </script>
</body>
</html>
