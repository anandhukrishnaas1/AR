<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquaphobia — PhobiaVR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="shared.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    #depth-indicator{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:100;color:#00ccff;font-family:Inter,sans-serif;font-size:14px;text-align:right;pointer-events:none;text-shadow:0 0 10px rgba(0,204,255,0.8)}
    #depth-indicator .depth-val{font-size:28px;font-weight:800;display:block}
    #water-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;opacity:0;transition:opacity 1.5s}
    #pressure-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;opacity:0;transition:opacity 2s;background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,30,0.7) 100%)}
    #storm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:48;opacity:0;transition:opacity 0.8s;background:linear-gradient(180deg,rgba(20,20,40,0.3) 0%,transparent 30%,transparent 70%,rgba(0,30,60,0.4) 100%)}
    #rain-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:47;opacity:0;transition:opacity 1s;background:repeating-linear-gradient(180deg,transparent,transparent 4px,rgba(150,180,220,0.06) 4px,rgba(150,180,220,0.06) 5px)}
    #island-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:200;color:#44ff88;font-family:Inter,sans-serif;font-size:22px;font-weight:700;text-shadow:0 0 15px rgba(68,255,136,0.8);opacity:0;transition:opacity 0.5s;pointer-events:none}
    @keyframes flashLightning{0%{opacity:0}10%{opacity:0.8}20%{opacity:0}30%{opacity:0.5}40%{opacity:0}100%{opacity:0}}
    #lightning-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:60;opacity:0;background:#fff}
  </style>
</head>
<body>
  <div id="depth-indicator"><span class="depth-val" id="depth-display">Ship</span>below surface</div>
  <div id="water-overlay"></div>
  <div id="pressure-overlay"></div>
  <div id="storm-overlay"></div>
  <div id="rain-overlay"></div>
  <div id="lightning-overlay"></div>
  <div id="island-msg">🏝️ SWIM TO THE ISLAND TO SURVIVE!</div>
  <div class="scene-ui">
    <div class="scene-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>🌊 Aquaphobia Therapy</h1>
      <div></div>
    </div>
    <div class="level-selector">
      <button class="level-btn active" onclick="setLevel(1)">Level 1: Calm Voyage</button>
      <button class="level-btn" onclick="setLevel(2)">Level 2: Ship Breaks — Storm</button>
      <button class="level-btn" onclick="setLevel(3)">Level 3: Swim to the Island</button>
    </div>
  </div>
  <div class="breathing-guide"><div class="breath-circle">Breathe In</div><div class="breath-label">Follow the rhythm</div></div>
  <div class="anxiety-meter"><span class="meter-label">Anxiety</span><div class="meter-track"><div class="meter-fill" style="height:30%"></div></div></div>
  <div class="comfort-msg" style="opacity:0;">You are safe here.</div>

  <a-scene id="vrscene" vr-mode-ui="enabled:true" renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true; logarithmicDepthBuffer:true" fog="type:linear; color:#88bbdd; near:80; far:400">
    <a-entity id="rig" position="0 5 0" thumbstick-locomotion="speed:5">
      <a-camera look-controls wasd-controls="acceleration:30">
        <a-cursor color="#00ccff" fuse="false" raycaster="far:500"></a-cursor>
      </a-camera>
      <a-entity id="left-hand" laser-controls="hand:left" raycaster="showLine:true; lineColor:#44aaff; lineOpacity:0.5; far:3"></a-entity>
      <a-entity id="right-hand" laser-controls="hand:right" raycaster="showLine:true; lineColor:#44aaff; lineOpacity:0.5; far:10"></a-entity>
    </a-entity>

    <!-- ===================================================================================== -->
    <!-- LEVEL 1: CALM VOYAGE — You're on a large ship, beautiful evening, peaceful ocean       -->
    <!-- ===================================================================================== -->
    <a-entity id="level1" visible="true">
      <!-- Sky & lighting — golden hour sunset -->
      <a-sky color="#6699cc"
             animation="property:material.color; from:#6699cc; to:#cc7744; dur:60000; dir:alternate; loop:true"></a-sky>
      <a-light type="directional" position="80 40 -60" color="#ffd4a0" intensity="2" cast-shadow="true"></a-light>
      <a-light type="ambient" color="#aabbdd" intensity="0.5"></a-light>
      <a-light type="hemisphere" color="#88aadd" groundColor="#554433" intensity="0.3"></a-light>
      <!-- Sun / sunset glow -->
      <a-sphere position="80 40 -60" radius="6" material="color:#ffdd88; emissive:#ffcc55; emissiveIntensity:1.5; fog:false"></a-sphere>
      <a-sphere position="80 40 -60" radius="12" material="color:#ffaa44; emissive:#ff8833; emissiveIntensity:0.3; opacity:0.3; transparent:true; fog:false"></a-sphere>

      <!-- Open ocean (massive water planes at sea level y=0) -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="3000" height="3000"
               material="color:#1a5577; opacity:0.88; transparent:true; metalness:0.5; roughness:0.15"
               animation="property:position; from:0 0.1 0; to:0 -0.1 0; dur:3500; dir:alternate; loop:true; easing:easeInOutSine"></a-plane>
      <!-- Secondary water layer for depth -->
      <a-plane position="0 -0.5 0" rotation="-90 0 0" width="3000" height="3000"
               material="color:#0e3a55; opacity:0.7; transparent:true"></a-plane>

      <!-- ===== THE SHIP (large wooden vessel) ===== -->
      <a-entity id="ship1" position="0 0 0"
                animation="property:rotation; from:0 0 -1; to:0 0 1; dur:5000; dir:alternate; loop:true; easing:easeInOutSine"
                animation__pitch="property:rotation.x; from:-0.5; to:0.5; dur:7000; dir:alternate; loop:true; easing:easeInOutSine">
        <!-- Main hull (boat-shaped boxes) -->
        <a-box position="0 1.5 0" width="6" height="3" depth="22" material="color:#5a3a1a; roughness:0.8"></a-box>
        <!-- Hull tapers (bow) -->
        <a-box position="0 1.5 -12" width="5" height="2.5" depth="4" material="color:#5a3a1a; roughness:0.8" rotation="0 0 0"></a-box>
        <a-box position="0 1.8 -15" width="3.5" height="2" depth="4" material="color:#5a3a1a; roughness:0.8"></a-box>
        <a-box position="0 2 -18" width="2" height="1.5" depth="4" material="color:#5a3a1a; roughness:0.8"></a-box>
        <a-box position="0 2.2 -20" width="1" height="1" depth="3" material="color:#5a3a1a; roughness:0.8"></a-box>
        <!-- Hull tapers (stern) -->
        <a-box position="0 1.5 10" width="5.5" height="2.8" depth="3" material="color:#5a3a1a; roughness:0.8"></a-box>
        <a-box position="0 1.8 12.5" width="4" height="2" depth="3" material="color:#5a3a1a; roughness:0.8"></a-box>

        <!-- Main deck -->
        <a-box position="0 3.05 0" width="6.2" height="0.1" depth="22" material="color:#7a5a30; roughness:0.7"></a-box>
        <a-box position="0 3.05 -13" width="5" height="0.1" depth="4" material="color:#7a5a30; roughness:0.7"></a-box>
        <a-box position="0 3.05 10.5" width="5.2" height="0.1" depth="3" material="color:#7a5a30; roughness:0.7"></a-box>

        <!-- Deck railings (port & starboard) -->
        <a-box position="-3.2 3.8 0" width="0.1" height="1.4" depth="22" material="color:#6a4a28"></a-box>
        <a-box position="3.2 3.8 0" width="0.1" height="1.4" depth="22" material="color:#6a4a28"></a-box>
        <a-box position="0 3.8 -11.5" width="6.4" height="1.4" depth="0.1" material="color:#6a4a28"></a-box>
        <!-- Railing posts -->
        <a-cylinder position="-3.2 3.8 -8" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="-3.2 3.8 -4" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="-3.2 3.8 0" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="-3.2 3.8 4" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="-3.2 3.8 8" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="3.2 3.8 -8" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="3.2 3.8 -4" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="3.2 3.8 0" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="3.2 3.8 4" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>
        <a-cylinder position="3.2 3.8 8" radius="0.04" height="1.4" material="color:#6a4a28"></a-cylinder>

        <!-- Cabin / wheelhouse at stern -->
        <a-box position="0 5 8" width="4" height="3.5" depth="5" material="color:#5a3a1a; roughness:0.7"></a-box>
        <a-box position="0 5 5.4" width="3.6" height="2" depth="0.05" material="color:#88ccee; opacity:0.3; transparent:true; metalness:0.6"></a-box>
        <!-- Cabin roof -->
        <a-box position="0 6.8 8" width="4.5" height="0.15" depth="5.5" material="color:#4a2a12; roughness:0.8"></a-box>
        <!-- Ship wheel -->
        <a-torus position="0 5.5 5.3" radius="0.4" radius-tubular="0.03" material="color:#8B6914; metalness:0.6" rotation="80 0 0"></a-torus>
        <!-- Wheel spokes -->
        <a-cylinder position="0 5.5 5.3" radius="0.02" height="0.8" material="color:#8B6914" rotation="80 0 0"></a-cylinder>
        <a-cylinder position="0 5.5 5.3" radius="0.02" height="0.8" material="color:#8B6914" rotation="80 0 90"></a-cylinder>

        <!-- Main mast -->
        <a-cylinder position="0 8 -3" radius="0.15" height="12" material="color:#8B6914; roughness:0.7"></a-cylinder>
        <!-- Cross beam -->
        <a-cylinder position="0 10 -3" radius="0.08" height="6" material="color:#7a5a28" rotation="0 0 90"></a-cylinder>
        <!-- Sails (cloth planes) -->
        <a-plane position="0 8.5 -3" width="5.5" height="5" material="color:#eeddcc; opacity:0.85; transparent:true; side:double"
                 animation="property:scale; from:1 1 1; to:1.02 0.98 1; dur:3000; dir:alternate; loop:true"></a-plane>
        <!-- Fore mast -->
        <a-cylinder position="0 6 -9" radius="0.12" height="8" material="color:#8B6914; roughness:0.7"></a-cylinder>
        <a-plane position="0 7 -9" width="4" height="3.5" material="color:#ddccbb; opacity:0.8; transparent:true; side:double"
                 animation="property:scale; from:1 1 1; to:1.03 0.97 1; dur:3500; dir:alternate; loop:true"></a-plane>

        <!-- Ship's flag -->
        <a-plane position="0.1 14 -3" width="1.5" height="1" material="color:#cc2222; side:double"
                 animation="property:rotation; from:0 15 0; to:0 -15 0; dur:1500; dir:alternate; loop:true"></a-plane>

        <!-- Cargo crates on deck -->
        <a-box position="-1.5 3.5 3" width="1" height="1" depth="1" material="color:#8a6a3a; roughness:0.9"></a-box>
        <a-box position="-1 3.5 4.5" width="0.8" height="0.8" depth="0.8" material="color:#6a5a3a; roughness:0.9"></a-box>
        <a-box position="2 3.5 2" width="1.2" height="0.7" depth="1.2" material="color:#9a7a4a; roughness:0.9"></a-box>
        <!-- Barrels -->
        <a-cylinder position="2 3.6 5" radius="0.35" height="0.8" material="color:#6a4a2a"></a-cylinder>
        <a-cylinder position="1.5 3.6 6" radius="0.3" height="0.7" material="color:#5a3a1a"></a-cylinder>

        <!-- Lanterns (warm glow) -->
        <a-sphere position="-2 5 0" radius="0.12" material="color:#ffaa44; emissive:#ffaa44; emissiveIntensity:0.8"></a-sphere>
        <a-light type="point" position="-2 5 0" color="#ffaa33" intensity="0.5" distance="6"></a-light>
        <a-sphere position="2 5 0" radius="0.12" material="color:#ffaa44; emissive:#ffaa44; emissiveIntensity:0.8"></a-sphere>
        <a-light type="point" position="2 5 0" color="#ffaa33" intensity="0.5" distance="6"></a-light>

        <!-- Rope coils -->
        <a-torus position="-2 3.15 -6" radius="0.3" radius-tubular="0.06" material="color:#b89060" rotation="-90 0 0"></a-torus>
        <a-torus position="1.8 3.15 -8" radius="0.25" radius-tubular="0.05" material="color:#a88050" rotation="-90 0 0"></a-torus>
      </a-entity>

      <!-- Ocean wave ripples (far) -->
      <a-plane position="60 0.05 -40" rotation="-90 0 0" width="30" height="30" material="color:#2288aa; opacity:0.3; transparent:true"
               animation="property:position; from:60 0.15 -40; to:60 -0.15 -40; dur:4000; dir:alternate; loop:true"></a-plane>
      <a-plane position="-50 0.05 30" rotation="-90 0 0" width="25" height="25" material="color:#2288aa; opacity:0.25; transparent:true"
               animation="property:position; from:-50 0.1 30; to:-50 -0.1 30; dur:5000; dir:alternate; loop:true"></a-plane>

      <!-- Distant birds (simple) -->
      <a-entity position="20 25 -30" animation="property:position; from:20 25 -30; to:-40 28 -50; dur:20000; loop:true; easing:linear">
        <a-plane width="0.8" height="0.15" material="color:#333; side:double" rotation="0 0 -15"></a-plane>
        <a-plane width="0.8" height="0.15" material="color:#333; side:double" rotation="0 0 15" position="0.6 0 0"></a-plane>
      </a-entity>

      <!-- Distant clouds -->
      <a-sphere position="40 30 -80" radius="8" material="color:#eee; opacity:0.6; transparent:true; fog:false"></a-sphere>
      <a-sphere position="50 32 -85" radius="6" material="color:#ddd; opacity:0.5; transparent:true; fog:false"></a-sphere>
      <a-sphere position="-30 35 -90" radius="10" material="color:#eee; opacity:0.5; transparent:true; fog:false"></a-sphere>

      <a-text value="CALM VOYAGE — You stand on the deck of a mighty sailing ship.\nThe ocean stretches endlessly in every direction.\nGolden sunset paints the sky. Gentle waves rock the hull.\nLook around. Feel the sea. This is peaceful... for now." position="0 8 -8" align="center" color="#ffddaa" scale="0.5 0.5 0.5" face-camera></a-text>
    </a-entity>

    <!-- ===================================================================================== -->
    <!-- LEVEL 2: SHIP BREAKS — Storm hits, ship cracks, you fall into violent ocean            -->
    <!-- ===================================================================================== -->
    <a-entity id="level2" visible="false">
      <!-- Dark stormy sky -->
      <a-sky color="#1a1a2a"></a-sky>
      <a-light type="ambient" color="#334" intensity="0.25"></a-light>
      <a-light type="directional" position="0 30 -10" color="#667788" intensity="0.5"></a-light>
      <a-light type="point" position="0 2 0" color="#4488aa" intensity="0.6" distance="15"></a-light>

      <!-- Lightning flash light -->
      <a-light id="lightning-light" type="point" position="0 50 -30" color="#ffffff" intensity="0" distance="200"
               animation="property:intensity; from:0; to:8; dur:100; delay:4000; dir:alternate; loop:true"></a-light>
      <a-light id="lightning-light2" type="point" position="30 40 20" color="#ccddff" intensity="0" distance="200"
               animation="property:intensity; from:0; to:6; dur:100; delay:9000; dir:alternate; loop:true"></a-light>

      <!-- Violent ocean surface -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="3000" height="3000"
               material="color:#0c2a40; opacity:0.9; transparent:true; metalness:0.4; roughness:0.3"
               animation="property:position; from:0 0.8 0; to:0 -0.8 0; dur:2000; dir:alternate; loop:true; easing:easeInOutSine"></a-plane>
      <a-plane position="0 -1 0" rotation="-90 0 0" width="3000" height="3000"
               material="color:#061825; opacity:0.8; transparent:true"></a-plane>

      <!-- MASSIVE WAVES (storm) -->
      <a-box position="0 3 -30" width="200" height="7" depth="15"
             material="color:#0a2838; opacity:0.7; transparent:true; metalness:0.3"
             animation="property:position; from:0 3 -60; to:0 3 20; dur:6000; loop:true; easing:linear"
             animation__y="property:position.y; from:2; to:4; dur:3000; dir:alternate; loop:true"></a-box>
      <a-box position="0 2.5 60" width="200" height="6" depth="12"
             material="color:#0c3040; opacity:0.65; transparent:true"
             animation="property:position; from:0 2.5 60; to:0 2.5 -20; dur:7000; loop:true; easing:linear"
             animation__y="property:position.y; from:1.5; to:3.5; dur:3500; dir:alternate; loop:true"></a-box>
      <!-- Wave foam crests -->
      <a-box position="0 6.5 -30" width="200" height="0.5" depth="3"
             material="color:#aaccdd; opacity:0.5; transparent:true"
             animation="property:position; from:0 6.5 -60; to:0 6.5 20; dur:6000; loop:true; easing:linear"></a-box>
      <!-- Cross wave -->
      <a-box position="40 2 0" width="12" height="5" depth="200"
             material="color:#0a2535; opacity:0.5; transparent:true"
             animation="property:position; from:40 2 0; to:-60 2 0; dur:8000; loop:true; easing:linear"
             animation__y="property:position.y; from:1; to:3; dur:4000; dir:alternate; loop:true"></a-box>

      <!-- THE BROKEN SHIP (sinking, split in two) -->
      <a-entity position="8 -1 -15" rotation="0 -20 25"
                animation="property:position.y; from:-1; to:-4; dur:20000; loop:false; easing:easeInQuad">
        <!-- Front half - sinking bow first -->
        <a-box width="6" height="3" depth="14" material="color:#5a3a1a; roughness:0.8"></a-box>
        <a-box position="0 1.55 0" width="6.2" height="0.1" depth="14" material="color:#7a5a30; roughness:0.7"></a-box>
        <!-- Broken mast -->
        <a-cylinder position="0 3 -2" radius="0.15" height="5" material="color:#8B6914" rotation="0 0 30"></a-cylinder>
        <!-- Torn sail dragging in water -->
        <a-plane position="1.5 4 -2" width="4" height="3" material="color:#ccbbaa; opacity:0.5; transparent:true; side:double" rotation="10 20 40"
                 animation="property:rotation; from:10 20 40; to:15 25 35; dur:2000; dir:alternate; loop:true"></a-plane>
        <!-- Fire on deck -->
        <a-sphere position="-1 2.5 3" radius="0.4" material="color:#ff4400; emissive:#ff6600; emissiveIntensity:1.5"
                  animation="property:scale; from:1 1 1; to:1.3 1.5 1.3; dur:400; dir:alternate; loop:true"></a-sphere>
        <a-sphere position="-0.5 3.2 3.2" radius="0.25" material="color:#ffaa00; emissive:#ff8800; emissiveIntensity:1"
                  animation="property:scale; from:0.8 0.8 0.8; to:1.2 1.6 1.2; dur:300; dir:alternate; loop:true"></a-sphere>
        <a-light type="point" position="-1 3 3" color="#ff6600" intensity="2" distance="8"></a-light>
      </a-entity>

      <a-entity position="-12 -2 10" rotation="0 15 -20"
                animation="property:position.y; from:-2; to:-6; dur:25000; loop:false; easing:easeInQuad">
        <!-- Back half -->
        <a-box width="5.5" height="2.8" depth="10" material="color:#5a3a1a; roughness:0.8"></a-box>
        <!-- Cabin wreckage -->
        <a-box position="0 2.5 2" width="3.5" height="2.5" depth="4" material="color:#5a3a1a; roughness:0.7" rotation="0 0 -10"></a-box>
      </a-entity>

      <!-- Floating debris in water -->
      <a-box position="3 0.3 -3" width="2" height="0.15" depth="1" material="color:#7a5a30"
             animation="property:rotation; from:0 0 -5; to:0 0 5; dur:3000; dir:alternate; loop:true"
             animation__bob="property:position.y; from:0.3; to:0.6; dur:2500; dir:alternate; loop:true"></a-box>
      <a-box position="-5 0.4 5" width="1.5" height="0.1" depth="2" material="color:#6a4a28"
             animation="property:position.y; from:0.4; to:0.1; dur:3500; dir:alternate; loop:true"></a-box>
      <a-cylinder position="6 0.3 2" radius="0.35" height="0.8" material="color:#6a4a2a"
                  animation="property:rotation; from:80 0 0; to:95 5 10; dur:4000; dir:alternate; loop:true"
                  animation__bob="property:position.y; from:0.3; to:0.5; dur:2800; dir:alternate; loop:true"></a-cylinder>
      <a-box position="-2 0.2 -8" width="0.8" height="0.8" depth="0.8" material="color:#8a6a3a"
             animation="property:rotation; from:0 0 0; to:20 30 15; dur:5000; dir:alternate; loop:true"></a-box>
      <!-- Floating rope -->
      <a-torus position="1 0.15 4" radius="0.4" radius-tubular="0.04" material="color:#b89060; opacity:0.8; transparent:true" rotation="-80 0 0"
               animation="property:position.y; from:0.15; to:0.35; dur:3000; dir:alternate; loop:true"></a-torus>

      <!-- Rain particles (vertical thin cylinders falling) -->
      <a-entity id="rain-group">
        <a-cylinder position="-3 10 -5" radius="0.005" height="2" material="color:#aabbcc; opacity:0.3; transparent:true"
                    animation="property:position.y; from:12; to:-1; dur:600; loop:true"></a-cylinder>
        <a-cylinder position="2 10 -3" radius="0.005" height="1.5" material="color:#aabbcc; opacity:0.25; transparent:true"
                    animation="property:position.y; from:14; to:-1; dur:500; loop:true; delay:100"></a-cylinder>
        <a-cylinder position="-1 10 2" radius="0.005" height="2.2" material="color:#99aacc; opacity:0.35; transparent:true"
                    animation="property:position.y; from:13; to:-1; dur:550; loop:true; delay:200"></a-cylinder>
        <a-cylinder position="4 10 1" radius="0.005" height="1.8" material="color:#aabbcc; opacity:0.3; transparent:true"
                    animation="property:position.y; from:15; to:-1; dur:650; loop:true; delay:150"></a-cylinder>
        <a-cylinder position="-5 10 -2" radius="0.005" height="2" material="color:#99aacc; opacity:0.3; transparent:true"
                    animation="property:position.y; from:12; to:-1; dur:580; loop:true; delay:300"></a-cylinder>

  <script src="shared.js"></script>
  <script>
    var depths = { 1: 'Ship', 2: 'Fallen!', 3: 'Swim!' };
    var lightningTimer = null;
    var islandCheckTimer = null;

    function setLevel(num) {
      document.getElementById('level1').setAttribute('visible', num === 1);
      document.getElementById('level2').setAttribute('visible', num === 2);
      document.getElementById('level3').setAttribute('visible', num === 3);
      var rig = document.getElementById('rig');
      var scene = document.getElementById('vrscene');
      var water = document.getElementById('water-overlay');
      var pressure = document.getElementById('pressure-overlay');
      var storm = document.getElementById('storm-overlay');
      var rain = document.getElementById('rain-overlay');
      var islandMsg = document.getElementById('island-msg');

      if (num === 1) {
        rig.setAttribute('position', '0 5 4');
        scene.setAttribute('fog', 'type:linear; color:#88bbdd; near:80; far:400');
        water.style.opacity = '0'; water.style.background = 'none';
        pressure.style.opacity = '0'; storm.style.opacity = '0'; rain.style.opacity = '0';
        islandMsg.style.opacity = '0';
      }
      if (num === 2) {
        rig.setAttribute('position', '0 1.6 0');
        scene.setAttribute('fog', 'type:exponential; color:#1a1a2a; density:0.012');
        water.style.opacity = '0.4';
        water.style.background = 'linear-gradient(180deg, rgba(0,20,40,0.3) 0%, rgba(0,40,80,0.5) 100%)';
        pressure.style.opacity = '0.3'; storm.style.opacity = '0.6'; rain.style.opacity = '0.7';
        islandMsg.style.opacity = '0';
      }
      if (num === 3) {
        rig.setAttribute('position', '0 1.2 0');
        scene.setAttribute('fog', 'type:exponential; color:#1a1a28; density:0.008');
        water.style.opacity = '0.5';
        water.style.background = 'linear-gradient(180deg, rgba(0,15,30,0.4) 0%, rgba(0,30,60,0.6) 100%)';
        pressure.style.opacity = '0.4'; storm.style.opacity = '0.7'; rain.style.opacity = '0.85';
        islandMsg.style.opacity = '1';
        startIslandCheck();
      }
      document.getElementById('depth-display').textContent = depths[num];
      document.querySelectorAll('.level-btn').forEach(function(btn, i) { btn.classList.toggle('active', i === num - 1); });
      showComfortMessage();
      startLightning(num);
    }

    function startLightning(level) {
      if (lightningTimer) clearInterval(lightningTimer);
      if (level < 2) return;
      lightningTimer = setInterval(function() {
        var el = document.getElementById('lightning-overlay');
        el.style.animation = 'flashLightning 0.4s ease-out';
        setTimeout(function() { el.style.animation = 'none'; }, 500);
      }, level === 2 ? 6000 : 4000);
    }

    function startIslandCheck() {
      if (islandCheckTimer) clearInterval(islandCheckTimer);
      islandCheckTimer = setInterval(function() {
        var rig = document.getElementById('rig');
        if (!rig) return;
        var pos = rig.object3D.position;
        var island = document.getElementById('the-island');
        if (!island) return;
        var ipos = island.object3D.position;
        var dx = pos.x - ipos.x;
        var dz = pos.z - ipos.z;
        var dist = Math.sqrt(dx * dx + dz * dz);
        var msg = document.getElementById('island-msg');
        if (dist < 18) {
          msg.textContent = '🏝️ YOU REACHED THE ISLAND! YOU SURVIVED!';
          msg.style.color = '#44ff88';
          msg.style.fontSize = '28px';
        } else if (dist < 40) {
          msg.textContent = '🏝️ ALMOST THERE! Keep swimming! (' + Math.round(dist) + 'm)';
          msg.style.color = '#88ffaa';
          msg.style.fontSize = '22px';
        } else {
          msg.textContent = '🏝️ SWIM TO THE ISLAND! (' + Math.round(dist) + 'm away)';
          msg.style.color = '#ffaa44';
          msg.style.fontSize = '20px';
        }
      }, 500);
    }

    window.addEventListener('load', function() { initPhobiaScene(); initVRPhobiaApp(); setLevel(1); });
  </script>
