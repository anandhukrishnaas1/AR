<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aquaphobia — PhobiaVR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    #depth-indicator{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:100;color:#00ccff;font-family:Inter,sans-serif;font-size:14px;text-align:right;pointer-events:none;text-shadow:0 0 10px rgba(0,204,255,0.8)}
    #depth-indicator .depth-val{font-size:28px;font-weight:800;display:block}
    #water-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;opacity:0;transition:opacity 1.5s}
    #pressure-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;opacity:0;transition:opacity 2s;background:radial-gradient(ellipse at center,transparent 20%,rgba(0,0,30,0.7) 100%)}
    @keyframes bubbleUp{0%{transform:translateY(0);opacity:0.7}100%{transform:translateY(-100vh);opacity:0}}
  </style>
</head>
<body>
  <div id="depth-indicator"><span class="depth-val" id="depth-display">0m</span>below surface</div>
  <div id="water-overlay"></div>
  <div id="pressure-overlay"></div>
  <div class="scene-ui">
    <div class="scene-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>🌊 Aquaphobia Therapy</h1>
      <div></div>
    </div>
    <div class="level-selector">
      <button class="level-btn active" onclick="setLevel(1)">Level 1: Tsunami Approach</button>
      <button class="level-btn" onclick="setLevel(2)">Level 2: Shipwreck Abyss</button>
      <button class="level-btn" onclick="setLevel(3)">Level 3: Mariana Trench</button>
    </div>
  </div>
  <div class="breathing-guide"><div class="breath-circle">Breathe In</div><div class="breath-label">Follow the rhythm</div></div>
  <div class="anxiety-meter"><span class="meter-label">Anxiety</span><div class="meter-track"><div class="meter-fill" style="height:30%"></div></div></div>
  <div class="comfort-msg" style="opacity:0;">You are safe here.</div>

  <a-scene id="vrscene" vr-mode-ui="enabled:true" renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true; logarithmicDepthBuffer:true" fog="type:exponential; color:#aaddee; density:0.002">
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls wasd-controls="acceleration:30">
        <a-cursor color="#00ccff" fuse="false" raycaster="far:500"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- ======= LEVEL 1: TSUNAMI APPROACHING SHORE ======= -->
    <a-entity id="level1" visible="true">
      <a-sky color="#5588aa"></a-sky>
      <a-light type="directional" position="30 60 -20" color="#ffe8c0" intensity="1.8" cast-shadow="true"></a-light>
      <a-light type="ambient" color="#aabbcc" intensity="0.4"></a-light>
      <a-light type="hemisphere" color="#88ccee" groundColor="#554422" intensity="0.25"></a-light>
      <!-- Sun -->
      <a-sphere position="30 60 -20" radius="5" material="color:#fff; emissive:#ffe8c0; emissiveIntensity:1; fog:false"></a-sphere>

      <!-- Sandy beach you stand on -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="200" height="100" material="color:#c2a060; roughness:1"></a-plane>
      <!-- Beach slopes down to water -->
      <a-box position="0 -1 -30" width="200" height="2" depth="40" material="color:#b89050; roughness:1" rotation="5 0 0"></a-box>

      <!-- Abandoned items on beach -->
      <a-box position="3 0.2 4" width="1.5" height="0.05" depth="2" material="color:#dd4444"></a-box><!-- towel -->
      <a-sphere position="-4 0.25 3" radius="0.25" material="color:#44cc44"></a-sphere><!-- ball -->
      <a-box position="6 0.15 5" width="0.5" height="0.5" depth="0.5" material="color:#2244aa"></a-box><!-- cooler -->
      <a-cylinder position="-6 0.5 6" radius="0.05" height="1.5" material="color:#8B4513" rotation="30 0 0"></a-cylinder><!-- umbrella pole -->
      <a-cone position="-6 1.3 5.6" radius-bottom="1" radius-top="0" height="0.6" material="color:#ff6600; opacity:0.7; transparent:true" rotation="30 0 0"></a-cone>

      <!-- Normal ocean surface -->
      <a-plane position="0 -2 -70" rotation="-90 0 0" width="3000" height="3000" material="color:#1a5577; opacity:0.85; transparent:true; metalness:0.4; roughness:0.2"></a-plane>
      <!-- Shallow water closer -->
      <a-plane position="0 -0.5 -40" rotation="-90 0 0" width="200" height="30" material="color:#2288aa; opacity:0.5; transparent:true"></a-plane>

      <!-- THE TSUNAMI — 30m wall of death approaching -->
      <a-box position="0 12 -250" width="800" height="30" depth="60" material="color:#0a3355; opacity:0.85; transparent:true; metalness:0.3"
             animation="property:position; from:0 12 -600; to:0 12 -60; dur:25000; loop:true; easing:easeInQuad">
      </a-box>
      <!-- Foam crest on top of wave -->
      <a-box position="0 27.5 -250" width="800" height="2" depth="65" material="color:#ffffff; opacity:0.7; transparent:true"
             animation="property:position; from:0 27.5 -600; to:0 27.5 -60; dur:25000; loop:true; easing:easeInQuad">
      </a-box>
      <!-- Secondary wave curl -->
      <a-cylinder position="0 26 -248" radius="8" height="800" material="color:#0c4060; opacity:0.6; transparent:true" rotation="0 0 90" open-ended="true"
                  animation="property:position; from:0 26 -598; to:0 26 -58; dur:25000; loop:true; easing:easeInQuad"></a-cylinder>
      <!-- Dark shadow under wave -->
      <a-box position="0 -5 -240" width="800" height="10" depth="80" material="color:#001122; opacity:0.6; transparent:true"
             animation="property:position; from:0 -5 -590; to:0 -5 -50; dur:25000; loop:true; easing:easeInQuad"></a-box>

      <!-- Water receding from shore (drops before tsunami) -->
      <a-plane position="0 -0.3 -25" rotation="-90 0 0" width="200" height="20" material="color:#1a5577; opacity:0.4; transparent:true"
               animation="property:position; from:0 -0.3 -25; to:0 -1.5 -50; dur:12000; loop:true"></a-plane>

      <!-- Debris swirling in approaching water -->
      <a-box position="-10 8 -240" width="2" height="0.5" depth="1" material="color:#8B4513"
             animation="property:position; from:-10 8 -590; to:-5 3 -55; dur:25000; loop:true; easing:easeInQuad"
             animation__rot="property:rotation; from:0 0 0; to:100 200 150; dur:25000; loop:true"></a-box>
      <a-box position="15 10 -260" width="3" height="1" depth="0.5" material="color:#666"
             animation="property:position; from:15 10 -610; to:10 5 -70; dur:25000; loop:true; easing:easeInQuad"
             animation__rot="property:rotation; from:0 0 0; to:60 300 90; dur:25000; loop:true"></a-box>
      <a-cylinder position="8 14 -255" radius="0.15" height="4" material="color:#654321"
                  animation="property:position; from:8 14 -605; to:3 7 -65; dur:25000; loop:true; easing:easeInQuad"
                  animation__rot="property:rotation; from:0 0 0; to:180 90 270; dur:25000; loop:true"></a-cylinder>

      <!-- Coastal buildings behind you -->
      <a-box position="-15 4 30" width="8" height="8" depth="6" material="color:#ddccaa"></a-box>
      <a-box position="-15 8.5 30" width="9" height="1" depth="7" material="color:#aa7744" rotation="0 0 5"></a-box>
      <a-box position="20 5 35" width="10" height="10" depth="8" material="color:#ccbbaa"></a-box>
      <a-box position="20 10.5 35" width="11" height="1" depth="9" material="color:#996633" rotation="5 0 0"></a-box>
      <a-box position="5 3 40" width="6" height="6" depth="5" material="color:#eeddcc"></a-box>

      <!-- Palm trees (bending violently) -->
      <a-cylinder position="-8 3 12" radius="0.2" height="7" material="color:#8B6914" rotation="20 0 0"></a-cylinder>
      <a-cone position="-8.7 7 11" radius-bottom="2.5" radius-top="0" height="2.5" material="color:#228822; opacity:0.8; transparent:true" rotation="30 0 0"></a-cone>
      <a-cylinder position="10 3.5 15" radius="0.18" height="8" material="color:#8B6914" rotation="18 0 10"></a-cylinder>
      <a-cone position="10.9 8.2 14" radius-bottom="2" radius-top="0" height="2" material="color:#228822; opacity:0.8; transparent:true" rotation="25 0 10"></a-cone>

      <!-- Siren atmosphere -->
      <a-text value="TSUNAMI WARNING — 30m WAVE INCOMING!\nThe ocean is pulling back. Debris swirls inside the wall of water.\nIt's 800m wide and moving fast. There's nowhere to run.\nThe ground trembles beneath you." position="0 5 -8" align="center" color="#ff4444" scale="0.6 0.6 0.6" face-camera></a-text>
    </a-entity>

    <!-- ======= LEVEL 2: DEEP SHIPWRECK — 120m Depth ======= -->
    <a-entity id="level2" visible="false">
      <a-sky color="#001825"></a-sky>
      <a-light type="ambient" color="#002244" intensity="0.2"></a-light>
      <a-light type="point" position="0 3 0" color="#00aaff" intensity="1" distance="25"></a-light>
      <a-light type="point" position="0 15 0" color="#004488" intensity="0.5" distance="60"></a-light>

      <!-- Faint surface light above (120m up) -->
      <a-sphere position="0 120 0" radius="80" material="color:#4488bb; opacity:0.08; transparent:true; fog:false"></a-sphere>

      <!-- Your dive light (attached to camera) -->
      <a-light type="spot" position="0 1.6 0" color="#aaddff" intensity="2" distance="30" angle="30" decay="2" target="#dive-target"></a-light>
      <a-entity id="dive-target" position="0 1 -10"></a-entity>

      <!-- Ocean floor (muddy, dark seabed) -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="300" height="300" material="color:#0a1a15; roughness:1"></a-plane>

      <!-- THE SHIPWRECK -->
      <!-- Main hull (tilted, broken in two) -->
      <a-box position="-5 6 -20" width="8" height="12" depth="45" material="color:#3a2a1a; metalness:0.5; roughness:0.8" rotation="0 15 18"></a-box>
      <!-- Second half of hull (separated) -->
      <a-box position="12 4 -40" width="7" height="10" depth="30" material="color:#3a2a1a; metalness:0.5; roughness:0.8" rotation="0 -20 -25"></a-box>
      <!-- Deck structure -->
      <a-box position="-5 12.5 -20" width="9" height="0.3" depth="46" material="color:#4a3a2a; metalness:0.4" rotation="0 15 18"></a-box>
      <!-- Cabin/bridge remains -->
      <a-box position="-4 14 -8" width="5" height="4" depth="6" material="color:#4a3520; metalness:0.4" rotation="0 15 18"></a-box>
      <!-- Mast (broken, fallen) -->
      <a-cylinder position="3 3 -15" radius="0.2" height="18" material="color:#5a4a3a; metalness:0.6" rotation="60 10 30"></a-cylinder>
      <!-- Torn sails / nets draped -->
      <a-plane position="3 7 -18" width="6" height="8" material="color:#445544; opacity:0.3; transparent:true; side:double" rotation="50 10 35"
               animation="property:rotation; from:50 10 35; to:55 12 32; dur:4000; dir:alternate; loop:true"></a-plane>
      <!-- Portholes (dark windows) -->
      <a-circle position="-1.5 7 2.5" radius="0.4" material="color:#001a1a; metalness:0.8" rotation="0 15 18"></a-circle>
      <a-circle position="-2.2 7 -3" radius="0.4" material="color:#001a1a; metalness:0.8" rotation="0 15 18"></a-circle>
      <a-circle position="-3 7 -8.5" radius="0.4" material="color:#001a1a; metalness:0.8" rotation="0 15 18"></a-circle>

      <!-- Scattered cargo -->
      <a-box position="4 0.3 -5" width="2" height="1.5" depth="1.5" material="color:#5a4a30" rotation="0 40 12"></a-box>
      <a-box position="-8 0.2 -3" width="1.5" height="1" depth="1" material="color:#4a3a25" rotation="0 -20 8"></a-box>
      <a-cylinder position="7 0.5 -12" radius="0.5" height="2" material="color:#444" rotation="90 0 20"></a-cylinder>
      <a-cylinder position="-3 0.4 5" radius="0.6" height="1.5" material="color:#555" rotation="85 0 40"></a-cylinder>

      <!-- Shark silhouettes circling (3 sharks) -->
      <a-entity animation="property:rotation; from:0 0 0; to:0 360 0; dur:30000; loop:true; easing:linear">
        <a-entity position="20 10 0">
          <a-cone radius-bottom="0.6" radius-top="0" height="3.5" material="color:#334455; opacity:0.7; transparent:true" rotation="90 0 0"></a-cone>
          <a-cone position="0 0 2" radius-bottom="0" radius-top="0.3" height="1.5" material="color:#334455; opacity:0.7; transparent:true" rotation="90 0 0"></a-cone>
          <a-box position="0 0.9 0.5" width="0.05" height="1.4" depth="1" material="color:#334455; opacity:0.7; transparent:true" rotation="0 0 0"></a-box>
        </a-entity>
      </a-entity>
      <a-entity animation="property:rotation; from:0 120 0; to:0 480 0; dur:40000; loop:true; easing:linear">
        <a-entity position="28 6 0">
          <a-cone radius-bottom="0.8" radius-top="0" height="4" material="color:#2a3a4a; opacity:0.5; transparent:true" rotation="90 0 0"></a-cone>
          <a-cone position="0 0 2.5" radius-bottom="0" radius-top="0.4" height="1.8" material="color:#2a3a4a; opacity:0.5; transparent:true" rotation="90 0 0"></a-cone>
          <a-box position="0 1.1 0.5" width="0.05" height="1.6" depth="1.2" material="color:#2a3a4a; opacity:0.5; transparent:true"></a-box>
        </a-entity>
      </a-entity>
      <a-entity animation="property:rotation; from:0 240 0; to:0 600 0; dur:25000; loop:true; easing:linear">
        <a-entity position="15 15 0">
          <a-cone radius-bottom="0.5" radius-top="0" height="3" material="color:#3a4a55; opacity:0.6; transparent:true" rotation="90 0 0"></a-cone>
          <a-cone position="0 0 1.8" radius-bottom="0" radius-top="0.25" height="1.2" material="color:#3a4a55; opacity:0.6; transparent:true" rotation="90 0 0"></a-cone>
          <a-box position="0 0.7 0.4" width="0.05" height="1.1" depth="0.8" material="color:#3a4a55; opacity:0.6; transparent:true"></a-box>
        </a-entity>
      </a-entity>

      <!-- Jellyfish colony drifting -->
      <a-entity animation="property:position; from:12 8 -30; to:-15 12 15; dur:40000; loop:true; easing:linear">
        <a-sphere radius="0.6" material="color:#ff88cc; opacity:0.3; transparent:true; emissive:#ff44aa; emissiveIntensity:0.3"
                  animation="property:scale; from:1 0.8 1; to:1 1.1 1; dur:1500; dir:alternate; loop:true"></a-sphere>
        <a-cylinder position="0.3 -1 0" radius="0.02" height="2" material="color:#ff88cc; opacity:0.2; transparent:true"
                    animation="property:rotation; from:0 0 5; to:0 0 -5; dur:2000; dir:alternate; loop:true"></a-cylinder>
        <a-cylinder position="-0.3 -1 0" radius="0.02" height="1.8" material="color:#ff88cc; opacity:0.2; transparent:true"
                    animation="property:rotation; from:0 0 -3; to:0 0 3; dur:2200; dir:alternate; loop:true"></a-cylinder>
      </a-entity>
      <a-entity animation="property:position; from:-18 14 20; to:20 10 -25; dur:50000; loop:true; easing:linear">
        <a-sphere radius="0.4" material="color:#88ccff; opacity:0.25; transparent:true; emissive:#4488ff; emissiveIntensity:0.3"
                  animation="property:scale; from:1 0.9 1; to:1 1.1 1; dur:1800; dir:alternate; loop:true"></a-sphere>
        <a-cylinder position="0 -0.8 0" radius="0.015" height="1.5" material="color:#88ccff; opacity:0.15; transparent:true"
                    animation="property:rotation; from:0 0 4; to:0 0 -4; dur:2500; dir:alternate; loop:true"></a-cylinder>
      </a-entity>

      <!-- Rising bubbles -->
      <a-sphere position="-6 0.5 -18" radius="0.08" material="color:#aaddff; opacity:0.5; transparent:true"
                animation="property:position; from:-6 0.5 -18; to:-5 120 -16; dur:15000; loop:true"></a-sphere>
      <a-sphere position="3 1 -10" radius="0.06" material="color:#aaddff; opacity:0.4; transparent:true"
                animation="property:position; from:3 1 -10; to:4 120 -8; dur:12000; loop:true; delay:3000"></a-sphere>
      <a-sphere position="-2 0.3 -25" radius="0.1" material="color:#aaddff; opacity:0.5; transparent:true"
                animation="property:position; from:-2 0.3 -25; to:-1 120 -23; dur:18000; loop:true; delay:5000"></a-sphere>
      <a-sphere position="8 0.4 -8" radius="0.05" material="color:#aaddff; opacity:0.35; transparent:true"
                animation="property:position; from:8 0.4 -8; to:9 120 -6; dur:10000; loop:true; delay:7000"></a-sphere>
      <a-sphere position="0 0.6 -15" radius="0.12" material="color:#aaddff; opacity:0.45; transparent:true"
                animation="property:position; from:0 0.6 -15; to:1 120 -13; dur:20000; loop:true; delay:2000"></a-sphere>
      <a-sphere position="5 0.2 -22" radius="0.07" material="color:#aaddff; opacity:0.3; transparent:true"
                animation="property:position; from:5 0.2 -22; to:6 120 -20; dur:14000; loop:true; delay:8000"></a-sphere>

      <!-- Coral and kelp -->
      <a-cone position="10 1 3" radius-bottom="0.8" radius-top="0.2" height="2.5" material="color:#884422; roughness:1"></a-cone>
      <a-cone position="10.5 1 2.5" radius-bottom="0.5" radius-top="0.1" height="1.8" material="color:#993322; roughness:1"></a-cone>
      <a-box position="-10 2.5 8" width="0.15" height="5" depth="0.8" material="color:#116622; opacity:0.7; transparent:true; side:double"
             animation="property:rotation; from:0 0 -5; to:0 0 5; dur:3000; dir:alternate; loop:true"></a-box>
      <a-box position="-9 2 9" width="0.12" height="4" depth="0.6" material="color:#118833; opacity:0.7; transparent:true; side:double"
             animation="property:rotation; from:0 0 3; to:0 0 -3; dur:3500; dir:alternate; loop:true"></a-box>
      <a-box position="-10.5 2.2 7" width="0.1" height="4.5" depth="0.7" material="color:#0f7733; opacity:0.6; transparent:true; side:double"
             animation="property:rotation; from:0 0 -4; to:0 0 4; dur:2800; dir:alternate; loop:true"></a-box>

      <!-- Water particles everywhere -->
      <a-entity>
        <a-sphere position="3 5 -8" radius="0.02" material="color:#aaddee; opacity:0.3; transparent:true"
                  animation="property:position; from:3 5 -8; to:4 4 -7; dur:5000; dir:alternate; loop:true"></a-sphere>
        <a-sphere position="-5 8 -15" radius="0.02" material="color:#88ccdd; opacity:0.25; transparent:true"
                  animation="property:position; from:-5 8 -15; to:-4 9 -14; dur:6000; dir:alternate; loop:true"></a-sphere>
        <a-sphere position="8 3 -5" radius="0.015" material="color:#aaddee; opacity:0.2; transparent:true"
                  animation="property:position; from:8 3 -5; to:7 4 -4; dur:4500; dir:alternate; loop:true"></a-sphere>
      </a-entity>

      <a-text value="SHIPWRECK DIVE — 120m below the surface.\nThree sharks circle in the darkness above.\nYour dive light barely reaches 20m.\nThe wreck groans as currents shift metal." position="0 4 -8" align="center" color="#00aaff" scale="0.45 0.45 0.45" face-camera></a-text>
    </a-entity>

    <!-- ======= LEVEL 3: MARIANA TRENCH — Cracking Submarine 10,900m ======= -->
    <a-entity id="level3" visible="false">
      <a-sky color="#000005"></a-sky>
      <a-light type="ambient" color="#000011" intensity="0.05"></a-light>
      <a-light type="point" position="0 1.5 0" color="#88aacc" intensity="0.8" distance="8"></a-light>

      <!-- Submarine interior (you are inside, hull cracking) -->
      <a-cylinder position="0 1.5 0" radius="2.5" height="9" material="color:#333; metalness:0.8; roughness:0.3; side:back; opacity:0.95; transparent:true" rotation="90 0 0" open-ended="true"></a-cylinder>
      <!-- Rivet seams -->
      <a-torus position="0 1.5 2.5" radius="2.5" radius-tubular="0.04" material="color:#555; metalness:0.9" rotation="90 0 0"></a-torus>
      <a-torus position="0 1.5 -2.5" radius="2.5" radius-tubular="0.04" material="color:#555; metalness:0.9" rotation="90 0 0"></a-torus>
      <a-torus position="0 1.5 0" radius="2.5" radius-tubular="0.04" material="color:#555; metalness:0.9" rotation="90 0 0"></a-torus>
      <!-- Floor grating -->
      <a-box position="0 0 0" width="4" height="0.1" depth="8" material="color:#2a2a2a; metalness:0.6"></a-box>

      <!-- Viewport (thick glass window) looking into abyss -->
      <a-circle position="0 1.8 -4.5" radius="1" material="color:#001a2a; metalness:0.9; opacity:0.7; transparent:true" rotation="0 0 0"></a-circle>
      <a-torus position="0 1.8 -4.48" radius="1.05" radius-tubular="0.08" material="color:#555; metalness:0.9" rotation="0 0 0"></a-torus>

      <!-- CRACK spreading across hull (animated growing glow) -->
      <a-box position="1.2 2.3 -1" width="0.015" height="0.01" depth="2.5" material="color:#00aaff; emissive:#0088ff; emissiveIntensity:0.3" rotation="5 10 5"
             animation="property:material.emissiveIntensity; from:0; to:1; dur:8000; loop:true; dir:alternate"></a-box>
      <a-box position="1.3 2.5 0.5" width="0.01" height="0.01" depth="1.5" material="color:#00bbff; emissive:#0099ff; emissiveIntensity:0.2" rotation="0 25 3"
             animation="property:material.emissiveIntensity; from:0; to:0.8; dur:6000; loop:true; dir:alternate; delay:2000"></a-box>
      <!-- Water droplets from crack -->
      <a-sphere position="1.2 2 0" radius="0.03" material="color:#0088cc; opacity:0.6; transparent:true"
                animation="property:position; from:1.2 2.3 0; to:1.2 0.1 0; dur:2000; loop:true"
                animation__fade="property:material.opacity; from:0.6; to:0; dur:2000; loop:true"></a-sphere>
      <a-sphere position="1.25 2 -0.5" radius="0.025" material="color:#0088cc; opacity:0.5; transparent:true"
                animation="property:position; from:1.25 2.3 -0.5; to:1.25 0.1 -0.5; dur:2500; loop:true; delay:1000"
                animation__fade="property:material.opacity; from:0.5; to:0; dur:2500; loop:true; delay:1000"></a-sphere>

      <!-- Control panels (flickering) -->
      <a-box position="-2 1.2 -2" width="0.1" height="1.2" depth="1.5" material="color:#222; metalness:0.7"></a-box>
      <a-plane position="-1.95 1.3 -2" width="1.4" height="1" material="color:#001100; emissive:#003300; emissiveIntensity:0.5"
               animation="property:material.emissiveIntensity; from:0.5; to:0.1; dur:300; dir:alternate; loop:true"></a-plane>
      <a-box position="2 1.2 1" width="0.1" height="0.8" depth="1" material="color:#222; metalness:0.7"></a-box>
      <a-plane position="1.95 1.3 1" width="0.9" height="0.7" material="color:#110000; emissive:#330000; emissiveIntensity:0.4" rotation="0 180 0"
               animation="property:material.emissiveIntensity; from:0.4; to:0; dur:500; dir:alternate; loop:true; delay:1000"></a-plane>

      <!-- Emergency red light -->
      <a-sphere position="0 2.8 0" radius="0.08" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0"
                animation="property:material.emissiveIntensity; from:0; to:1.5; dur:1200; dir:alternate; loop:true"></a-sphere>

      <!-- Through the viewport: Deep sea horrors -->
      <!-- Bioluminescent creatures passing -->
      <a-entity animation="property:position; from:15 3 -15; to:-20 1 -8; dur:18000; loop:true; easing:linear">
        <a-sphere radius="0.15" material="color:#00ffaa; emissive:#00ff88; emissiveIntensity:1; fog:false"></a-sphere>
        <a-sphere position="0.5 0 0" radius="0.08" material="color:#00ffaa; emissive:#00ff88; emissiveIntensity:0.5; fog:false"></a-sphere>
      </a-entity>
      <a-entity animation="property:position; from:-18 0 -20; to:15 4 -10; dur:25000; loop:true; easing:linear; delay:5000">
        <a-sphere radius="0.2" material="color:#ff4488; emissive:#ff2266; emissiveIntensity:0.8; fog:false"></a-sphere>
      </a-entity>
      <a-entity animation="property:position; from:12 -2 -18; to:-15 2 -13; dur:22000; loop:true; easing:linear; delay:10000">
        <a-sphere radius="0.1" material="color:#4488ff; emissive:#2266ff; emissiveIntensity:1.2; fog:false"></a-sphere>
        <a-sphere position="0 0.2 0" radius="0.04" material="color:#4488ff; emissive:#2266ff; emissiveIntensity:0.6; fog:false"></a-sphere>
        <a-sphere position="0 -0.2 0" radius="0.04" material="color:#4488ff; emissive:#2266ff; emissiveIntensity:0.6; fog:false"></a-sphere>
      </a-entity>

      <!-- Giant squid tentacle passing viewport -->
      <a-cylinder position="5 1.5 -8" radius="0.2" height="10" material="color:#442233; opacity:0.4; transparent:true" rotation="10 30 70"
                  animation="property:position; from:5 1.5 -8; to:-10 2 -6; dur:20000; loop:true; easing:linear; delay:12000"
                  animation__rot="property:rotation; from:10 30 70; to:20 -30 50; dur:20000; loop:true; delay:12000"></a-cylinder>
      <a-cylinder position="6 0.5 -9" radius="0.15" height="8" material="color:#332222; opacity:0.35; transparent:true" rotation="-5 40 65"
                  animation="property:position; from:6 0.5 -9; to:-9 1 -7; dur:20000; loop:true; easing:linear; delay:12000"
                  animation__rot="property:rotation; from:-5 40 65; to:15 -20 55; dur:20000; loop:true; delay:12000"></a-cylinder>

      <!-- Pressure groaning effects (visual pulses on hull) -->
      <a-cylinder position="0 1.5 0" radius="2.52" height="9.02" material="color:#0044aa; opacity:0; transparent:true; side:back" rotation="90 0 0" open-ended="true"
                  animation="property:material.opacity; from:0; to:0.15; dur:1000; delay:5000; dir:alternate; loop:true"></a-cylinder>

      <!-- Depth gauge display -->
      <a-plane position="-1.95 1.8 -1" width="0.5" height="0.3" material="color:#001a00; emissive:#003300; emissiveIntensity:0.4"></a-plane>
      <a-text position="-1.94 1.8 -1" value="10,916m" color="#00ff00" scale="0.15 0.15 0.15" align="center"></a-text>

      <a-text value="MARIANA TRENCH — 10,916m below sea level.\nPressure: 1,086 atmospheres. The hull is cracking.\nWater seeps through. Creatures from the deep pass your window.\nIf the hull fails, you'll be crushed in milliseconds." position="0 3.2 -3" align="center" color="#00ccff" scale="0.3 0.3 0.3" face-camera></a-text>
    </a-entity>
  </a-scene>

  <script src="shared.js"></script>
  <script>
    var depths = { 1: '0m', 2: '-120m', 3: '-10,916m' };
    function setLevel(num) {
      document.getElementById('level1').setAttribute('visible', num === 1);
      document.getElementById('level2').setAttribute('visible', num === 2);
      document.getElementById('level3').setAttribute('visible', num === 3);
      var rig = document.getElementById('rig');
      var scene = document.getElementById('vrscene');
      var water = document.getElementById('water-overlay');
      var pressure = document.getElementById('pressure-overlay');
      if (num === 1) { rig.setAttribute('position','0 1.6 8'); scene.setAttribute('fog','type:exponential; color:#aaddee; density:0.002'); water.style.opacity='0'; pressure.style.opacity='0'; water.style.background='none'; }
      if (num === 2) { rig.setAttribute('position','0 1.6 5'); scene.setAttribute('fog','type:exponential; color:#001825; density:0.015'); water.style.opacity='0.5'; water.style.background='linear-gradient(180deg, rgba(0,30,60,0.3) 0%, rgba(0,15,40,0.6) 100%)'; pressure.style.opacity='0.35'; }
      if (num === 3) { rig.setAttribute('position','0 1.6 2'); scene.setAttribute('fog','type:exponential; color:#000005; density:0.04'); water.style.opacity='0.75'; water.style.background='linear-gradient(180deg, rgba(0,0,10,0.8) 0%, rgba(0,0,5,0.95) 100%)'; pressure.style.opacity='0.7'; }
      document.getElementById('depth-display').textContent = depths[num];
      document.querySelectorAll('.level-btn').forEach(function(btn, i) { btn.classList.toggle('active', i === num - 1); });
      showComfortMessage();
    }
    // Hull stress creaking visual pulse
    setInterval(function() {
      if (document.getElementById('level3').getAttribute('visible')) {
        document.getElementById('pressure-overlay').style.animation = 'none';
        document.getElementById('pressure-overlay').offsetHeight;
        document.getElementById('pressure-overlay').style.transition = 'opacity 0.3s';
        document.getElementById('pressure-overlay').style.opacity = '0.9';
        setTimeout(function(){ document.getElementById('pressure-overlay').style.opacity = '0.7'; }, 300);
      }
    }, 4000 + Math.random() * 6000);
    window.addEventListener('load', function() { initPhobiaScene(); initVRPhobiaApp(); setLevel(1); });
  </script>
</body>
</html>
