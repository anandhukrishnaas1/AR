<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyctophobia — PhobiaVR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- UI Overlay -->
  <div class="scene-ui">
    <div class="scene-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>🌑 Nyctophobia Therapy</h1>
      <div></div>
    </div>
    <div class="level-selector">
      <button class="level-btn active" onclick="setLevel(1)">Level 1: Dim Room</button>
      <button class="level-btn" onclick="setLevel(2)">Level 2: Twilight Path</button>
      <button class="level-btn" onclick="setLevel(3)">Level 3: Dark Forest</button>
    </div>
  </div>

  <!-- Breathing Guide -->
  <div class="breathing-guide">
    <div class="breath-circle">Breathe In</div>
    <div class="breath-label">Follow the rhythm</div>
  </div>

  <!-- Anxiety Meter -->
  <div class="anxiety-meter">
    <span class="meter-label">Anxiety</span>
    <div class="meter-track">
      <div class="meter-fill" style="height: 30%"></div>
    </div>
  </div>

  <!-- Comfort Message -->
  <div class="comfort-msg" style="opacity: 0;">You're safe here.</div>

  <!-- A-Frame Scene -->
  <a-scene id="vrscene" vr-mode-ui="enabled: true" renderer="antialias: true; precision: medium">
    <!-- Camera with flashlight for level 3 -->
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls wasd-controls="acceleration: 20">
        <a-cursor color="#a78bfa" fuse="false" raycaster="far: 20"></a-cursor>
        <!-- Flashlight (only visible in level 3) -->
        <a-light id="flashlight" type="spot" color="#fff8cc" intensity="0" angle="25" 
                 penumbra="0.3" distance="20" target=""></a-light>
      </a-camera>
    </a-entity>

    <!-- ========== LEVEL 1: Dim Room (comfortable darkness) ========== -->
    <a-entity id="level1" visible="true">
      <!-- Very dim ambient -->
      <a-sky color="#1a1520"></a-sky>
      <a-light type="ambient" color="#443355" intensity="0.2" cast-shadow="false"></a-light>
      
      <!-- Warm lamp on table -->
      <a-light type="point" position="2 1.2 -2" color="#ffaa44" intensity="0.8" distance="8" decay="2"></a-light>
      
      <!-- Nightlight glow -->
      <a-light type="point" position="-3 0.3 -3" color="#ff8844" intensity="0.4" distance="5" decay="2"></a-light>
      
      <!-- Room -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="8" height="8" material="color: #3a2a1a; roughness: 1; metalness: 0; shader: standard"></a-plane>
      <a-box position="0 2 -4" width="8" height="4" depth="0.2" material="color: #2a2030; roughness: 0.95; metalness: 0"></a-box>
      <a-box position="-4 2 0" width="0.2" height="4" depth="8" material="color: #2a2030; roughness: 0.95; metalness: 0"></a-box>
      <a-box position="4 2 0" width="0.2" height="4" depth="8" material="color: #2a2030; roughness: 0.95; metalness: 0"></a-box>
      <a-box position="0 2 4" width="8" height="4" depth="0.2" material="color: #2a2030; roughness: 0.95; metalness: 0"></a-box>
      <a-plane position="0 4 0" rotation="90 0 0" width="8" height="8" material="color: #1a1520; roughness: 1; metalness: 0"></a-plane>
      
      <!-- Bed -->
      <a-box position="-2 0.3 -3" width="2" height="0.6" depth="2.5" material="color: #4a3a2a; roughness: 0.85; metalness: 0"></a-box>
      <a-box position="-2 0.5 -3" width="1.8" height="0.2" depth="2.3" material="color: #6a5a8a; roughness: 0.8; metalness: 0; shader: standard"></a-box>
      <a-box position="-2 0.5 -4" width="1.8" height="0.3" depth="0.5" material="color: #fff; opacity: 0.85; transparent: true; roughness: 0.6; metalness: 0; shader: standard"></a-box>
      
      <!-- Bedside table with lamp -->
      <a-box position="2 0.4 -2" width="0.5" height="0.8" depth="0.5" material="color: #5a4a3a"></a-box>
      <a-cylinder position="2 0.9 -2" radius="0.06" height="0.3" material="color: #888"></a-cylinder>
      <a-cone position="2 1.15 -2" radius-bottom="0.2" radius-top="0.08" height="0.25" 
              material="color: #ffcc88; opacity: 0.8; transparent: true; emissive: #ffaa44; emissiveIntensity: 0.5"></a-cone>
      
      <!-- Nightlight on the wall -->
      <a-sphere position="-3 0.3 -3" radius="0.08" 
                material="color: #ff8844; emissive: #ff6622; emissiveIntensity: 0.8"></a-sphere>
      
      <!-- Window with moonlight -->
      <a-box position="4 2 -1" width="0.1" height="1.5" depth="1.2" 
             material="color: #223344; opacity: 0.5; transparent: true"></a-box>
      <a-light type="spot" position="4.5 2.5 -1" color="#bbccff" intensity="0.2" angle="40" distance="6" 
               target=""></a-light>
      
      <!-- Bookshelf -->
      <a-box position="-3.8 1 1" width="0.3" height="2" depth="1" material="color: #4a3a2a"></a-box>
      <a-box position="-3.8 0.8 1" width="0.25" height="0.3" depth="0.2" material="color: #8a4a3a"></a-box>
      <a-box position="-3.8 0.8 1.3" width="0.25" height="0.25" depth="0.15" material="color: #3a4a8a"></a-box>
      <a-box position="-3.8 1.3 1" width="0.25" height="0.35" depth="0.2" material="color: #3a8a4a"></a-box>
      
      <!-- Soft rug -->
      <a-circle position="0 0.01 -1" rotation="-90 0 0" radius="1.5" 
                material="color: #5a4a6a; roughness: 1"></a-circle>
      
      <a-text value="Your bedroom at night.\nThe lamp and nightlight keep you company." 
              position="0 3 -2" align="center" color="#a78bfa" scale="0.4 0.4 0.4" face-camera></a-text>
    </a-entity>

    <!-- ========== LEVEL 2: Twilight Garden Path ========== -->
    <a-entity id="level2" visible="false">
      <!-- Dusk sky -->
      <a-sky color="#1a1030"></a-sky>
      
      <!-- Very low ambient (twilight) -->
      <a-light type="ambient" color="#221835" intensity="0.2"></a-light>
      
      <!-- Moon -->
      <a-sphere position="20 15 -30" radius="2" 
                material="color: #eeeeff; emissive: #ccccff; emissiveIntensity: 0.4"></a-sphere>
      <a-light type="directional" position="20 15 -30" color="#667799" intensity="0.3"></a-light>
      
      <!-- Stars -->
      <a-entity id="stars">
        <a-sphere position="10 20 -30" radius="0.05" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="-15 25 -20" radius="0.04" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="5 22 -25" radius="0.06" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="-8 18 -35" radius="0.04" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="12 28 -15" radius="0.05" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="-20 22 -28" radius="0.03" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="18 24 -22" radius="0.04" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="-5 30 -18" radius="0.05" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="25 20 -32" radius="0.03" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
        <a-sphere position="-12 26 -24" radius="0.06" material="color: #fff; emissive: #fff; emissiveIntensity: 1"></a-sphere>
      </a-entity>
      
      <!-- Ground -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="40" height="40" material="color: #1a2a15; roughness: 1"></a-plane>
      
      <!-- Stone path -->
      <a-box position="0 0.02 -2" width="1.5" height="0.04" depth="2" material="color: #555; roughness: 0.9"></a-box>
      <a-box position="0.3 0.02 -5" width="1.5" height="0.04" depth="2" material="color: #555; roughness: 0.9"></a-box>
      <a-box position="-0.2 0.02 -8" width="1.5" height="0.04" depth="2" material="color: #555; roughness: 0.9"></a-box>
      <a-box position="0.1 0.02 -11" width="1.5" height="0.04" depth="2" material="color: #555; roughness: 0.9"></a-box>
      
      <!-- Garden lanterns (warm light sources along path) -->
      <a-entity position="-1.5 0 -3">
        <a-cylinder radius="0.05" height="0.8" material="color: #444"></a-cylinder>
        <a-sphere position="0 0.5 0" radius="0.12" 
                  material="color: #ffaa44; emissive: #ff8822; emissiveIntensity: 0.6; opacity: 0.8; transparent: true"></a-sphere>
        <a-light type="point" position="0 0.5 0" color="#ffaa44" intensity="0.4" distance="5"></a-light>
      </a-entity>
      
      <a-entity position="1.5 0 -6">
        <a-cylinder radius="0.05" height="0.8" material="color: #444"></a-cylinder>
        <a-sphere position="0 0.5 0" radius="0.12" 
                  material="color: #ffaa44; emissive: #ff8822; emissiveIntensity: 0.6; opacity: 0.8; transparent: true"></a-sphere>
        <a-light type="point" position="0 0.5 0" color="#ffaa44" intensity="0.4" distance="5"></a-light>
      </a-entity>
      
      <a-entity position="-1.5 0 -9">
        <a-cylinder radius="0.05" height="0.8" material="color: #444"></a-cylinder>
        <a-sphere position="0 0.5 0" radius="0.12" 
                  material="color: #ffaa44; emissive: #ff8822; emissiveIntensity: 0.6; opacity: 0.8; transparent: true"></a-sphere>
        <a-light type="point" position="0 0.5 0" color="#ffaa44" intensity="0.4" distance="5"></a-light>
      </a-entity>
      
      <!-- Garden bushes (dark shapes) -->
      <a-sphere position="-3 0.5 -4" radius="0.8" material="color: #1a3a1a"></a-sphere>
      <a-sphere position="3 0.4 -7" radius="0.6" material="color: #1a3010"></a-sphere>
      <a-sphere position="-4 0.6 -10" radius="1" material="color: #1a2a15"></a-sphere>
      <a-sphere position="4 0.5 -3" radius="0.7" material="color: #1a3518"></a-sphere>
      
      <!-- Trees (silhouettes) -->
      <a-entity position="-5 0 -6">
        <a-cylinder radius="0.2" height="4" material="color: #2a1a0a"></a-cylinder>
        <a-sphere position="0 2.5 0" radius="1.5" material="color: #1a2a10"></a-sphere>
      </a-entity>
      <a-entity position="6 0 -10">
        <a-cylinder radius="0.25" height="5" material="color: #2a1a0a"></a-cylinder>
        <a-sphere position="0 3 0" radius="1.8" material="color: #1a2810"></a-sphere>
      </a-entity>
      
      <!-- Fireflies -->
      <a-sphere position="-2 1.2 -5" radius="0.04" 
                material="color: #aaffaa; emissive: #88ff88; emissiveIntensity: 1"
                animation="property: position; to: -1.5 1.5 -5.5; dur: 5000; dir: alternate; loop: true; easing: easeInOutSine"
                animation__glow="property: material.emissiveIntensity; from: 0.2; to: 1; dur: 2000; dir: alternate; loop: true"></a-sphere>
      <a-sphere position="1 0.8 -7" radius="0.03" 
                material="color: #aaffaa; emissive: #88ff88; emissiveIntensity: 1"
                animation="property: position; to: 1.5 1.2 -7.5; dur: 4000; dir: alternate; loop: true; easing: easeInOutSine"
                animation__glow="property: material.emissiveIntensity; from: 0.3; to: 1; dur: 1800; dir: alternate; loop: true"></a-sphere>
      <a-sphere position="-3 1 -9" radius="0.035" 
                material="color: #aaffaa; emissive: #88ff88; emissiveIntensity: 1"
                animation="property: position; to: -2.5 1.4 -8.5; dur: 6000; dir: alternate; loop: true; easing: easeInOutSine"
                animation__glow="property: material.emissiveIntensity; from: 0.1; to: 1; dur: 2500; dir: alternate; loop: true"></a-sphere>
      <a-sphere position="2 1.5 -4" radius="0.03" 
                material="color: #aaffaa; emissive: #88ff88; emissiveIntensity: 1"
                animation="property: position; to: 2.5 1 -4.5; dur: 3500; dir: alternate; loop: true; easing: easeInOutSine"
                animation__glow="property: material.emissiveIntensity; from: 0.2; to: 1; dur: 3000; dir: alternate; loop: true"></a-sphere>
      
      <!-- Bench -->
      <a-box position="2.5 0.3 -5" width="1.5" height="0.1" depth="0.5" material="color: #5a4a3a"></a-box>
      <a-box position="1.9 0.15 -5" width="0.1" height="0.3" depth="0.5" material="color: #5a4a3a"></a-box>
      <a-box position="3.1 0.15 -5" width="0.1" height="0.3" depth="0.5" material="color: #5a4a3a"></a-box>
      
      <a-text value="Twilight Garden — Lanterns guide your path.\nWalk forward, enjoy the fireflies." 
              position="0 2.5 -2" align="center" color="#a78bfa" scale="0.45 0.45 0.45" face-camera></a-text>
    </a-entity>

    <!-- ========== LEVEL 3: Dark Forest at Midnight ========== -->
    <a-entity id="level3" visible="false">
      <!-- Pitch dark sky -->
      <a-sky color="#050508"></a-sky>
      
      <!-- Minimal ambient (almost nothing) -->
      <a-light type="ambient" color="#111122" intensity="0.08"></a-light>
      
      <!-- Faint moonlight through canopy -->
      <a-light type="directional" position="5 10 -5" color="#334466" intensity="0.15"></a-light>
      
      <!-- Ground -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" material="color: #0a0f08; roughness: 1"></a-plane>
      
      <!-- Fallen leaves / forest floor texture approximation -->
      <a-plane position="0 0.01 -3" rotation="-90 45 0" width="3" height="3" 
               material="color: #1a1a0a; roughness: 1; opacity: 0.5; transparent: true"></a-plane>
      
      <!-- Dense trees (dark, surrounding) -->
      <!-- Near trees -->
      <a-entity position="-2 0 -3">
        <a-cylinder radius="0.3" height="6" material="color: #1a1008"></a-cylinder>
        <a-sphere position="0 4 0" radius="2" material="color: #0a1508; opacity: 0.9; transparent: true"></a-sphere>
      </a-entity>
      <a-entity position="3 0 -5">
        <a-cylinder radius="0.35" height="7" material="color: #181008"></a-cylinder>
        <a-sphere position="0 4.5 0" radius="2.2" material="color: #0a1208; opacity: 0.9; transparent: true"></a-sphere>
      </a-entity>
      <a-entity position="-4 0 -6">
        <a-cylinder radius="0.25" height="5.5" material="color: #1a1008"></a-cylinder>
        <a-sphere position="0 3.5 0" radius="1.8" material="color: #0a1508; opacity: 0.9; transparent: true"></a-sphere>
      </a-entity>
      <a-entity position="1 0 -8">
        <a-cylinder radius="0.4" height="8" material="color: #151008"></a-cylinder>
        <a-sphere position="0 5 0" radius="2.5" material="color: #0a1008; opacity: 0.9; transparent: true"></a-sphere>
      </a-entity>
      <a-entity position="-3 0 -10">
        <a-cylinder radius="0.3" height="6.5" material="color: #1a1008"></a-cylinder>
        <a-sphere position="0 4 0" radius="2" material="color: #0a1508; opacity: 0.9; transparent: true"></a-sphere>
      </a-entity>
      
      <!-- Side trees -->
      <a-entity position="5 0 -2">
        <a-cylinder radius="0.35" height="7" material="color: #180e06"></a-cylinder>
        <a-sphere position="0 4.5 0" radius="2.3" material="color: #0a1308"></a-sphere>
      </a-entity>
      <a-entity position="-5 0 -1">
        <a-cylinder radius="0.3" height="6" material="color: #1a1008"></a-cylinder>
        <a-sphere position="0 3.8 0" radius="2" material="color: #0a1508"></a-sphere>
      </a-entity>
      <a-entity position="4 0 -9">
        <a-cylinder radius="0.28" height="5.5" material="color: #1a1008"></a-cylinder>
        <a-sphere position="0 3.5 0" radius="1.8" material="color: #0a1408"></a-sphere>
      </a-entity>
      <a-entity position="-6 0 -7">
        <a-cylinder radius="0.32" height="6.5" material="color: #180e06"></a-cylinder>
        <a-sphere position="0 4 0" radius="2.1" material="color: #0a1308"></a-sphere>
      </a-entity>
      
      <!-- Behind trees -->
      <a-entity position="2 0 3">
        <a-cylinder radius="0.3" height="6" material="color: #1a1008"></a-cylinder>
        <a-sphere position="0 4 0" radius="2" material="color: #0a1508"></a-sphere>
      </a-entity>
      <a-entity position="-3 0 4">
        <a-cylinder radius="0.25" height="5" material="color: #181008"></a-cylinder>
        <a-sphere position="0 3.5 0" radius="1.5" material="color: #0a1508"></a-sphere>
      </a-entity>
      
      <!-- Faint path (barely visible) -->
      <a-box position="0 0.01 -3" width="1" height="0.02" depth="3" material="color: #1a1510; roughness: 1"></a-box>
      <a-box position="0.2 0.01 -7" width="1" height="0.02" depth="3" material="color: #1a1510; roughness: 1"></a-box>
      
      <!-- Owl eyes (spooky but gentle) -->
      <a-entity position="-3 3.5 -5">
        <a-sphere position="-0.08 0 0.3" radius="0.04" 
                  material="color: #ffcc00; emissive: #ffaa00; emissiveIntensity: 0.5"
                  animation="property: material.emissiveIntensity; from: 0.2; to: 0.8; dur: 3000; dir: alternate; loop: true"></a-sphere>
        <a-sphere position="0.08 0 0.3" radius="0.04" 
                  material="color: #ffcc00; emissive: #ffaa00; emissiveIntensity: 0.5"
                  animation="property: material.emissiveIntensity; from: 0.2; to: 0.8; dur: 3000; dir: alternate; loop: true"></a-sphere>
      </a-entity>
      
      <!-- Single distant light (cabin?) -->
      <a-sphere position="8 1 -15" radius="0.1" 
                material="color: #ffaa44; emissive: #ff8822; emissiveIntensity: 0.6"></a-sphere>
      <a-light type="point" position="8 1 -15" color="#ffaa44" intensity="0.15" distance="8"></a-light>
      
      <!-- Fog/mist (low-lying) -->
      <a-entity position="0 0.3 -5">
        <a-plane rotation="-90 0 0" width="15" height="15" 
                 material="color: #223344; opacity: 0.08; transparent: true"></a-plane>
      </a-entity>
      
      <!-- Mushrooms with faint glow -->
      <a-entity position="1.5 0 -2">
        <a-cylinder radius="0.02" height="0.1" material="color: #aa9988"></a-cylinder>
        <a-sphere position="0 0.08 0" radius="0.06" 
                  material="color: #44aa88; emissive: #22aa66; emissiveIntensity: 0.3"></a-sphere>
      </a-entity>
      <a-entity position="-1 0 -5">
        <a-cylinder radius="0.02" height="0.08" material="color: #aa9988"></a-cylinder>
        <a-sphere position="0 0.06 0" radius="0.05" 
                  material="color: #44aa88; emissive: #22aa66; emissiveIntensity: 0.3"></a-sphere>
      </a-entity>
      
      <!-- Sound indicators -->
      <a-text value="~ hoot... hoot ~" position="-3 4 -5" color="#554433" scale="0.2 0.2 0.2"
              animation="property: material.opacity; from: 0; to: 0.6; dur: 5000; dir: alternate; loop: true"></a-text>
      <a-text value="~ rustle ~" position="4 1 -7" color="#443322" scale="0.2 0.2 0.2"
              animation="property: material.opacity; from: 0; to: 0.5; dur: 3000; dir: alternate; loop: true; startEvents: none" 
              animation__show="property: material.opacity; from: 0; to: 0.5; dur: 3000; dir: alternate; loop: true"></a-text>
      
      <a-text value="Dark Forest — Use your flashlight (look around).\nEvery shadow is just a tree. You're okay." 
              position="0 2.5 -2" align="center" color="#a78bfa" scale="0.4 0.4 0.4" face-camera></a-text>
    </a-entity>
  </a-scene>

  <script src="shared.js"></script>
  <script>
    function setLevel(num) {
      document.getElementById('level1').setAttribute('visible', num === 1);
      document.getElementById('level2').setAttribute('visible', num === 2);
      document.getElementById('level3').setAttribute('visible', num === 3);

      const rig = document.getElementById('rig');
      const flashlight = document.getElementById('flashlight');
      
      if (num === 1) {
        rig.setAttribute('position', '0 1.6 1');
        flashlight.setAttribute('intensity', 0);
      }
      if (num === 2) {
        rig.setAttribute('position', '0 1.6 2');
        flashlight.setAttribute('intensity', 0);
      }
      if (num === 3) {
        rig.setAttribute('position', '0 1.6 2');
        flashlight.setAttribute('intensity', 1.5);
      }

      document.querySelectorAll('.level-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === num - 1);
      });
      showComfortMessage();
    }

    window.addEventListener('load', () => {
      initPhobiaScene();
      initVRPhobiaApp();
      setLevel(1);
    });
  </script>
</body>
</html>
