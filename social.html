<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Anxiety — PhobiaVR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="shared.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    #crowd-indicator{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:100;color:#ff6688;font-family:Inter,sans-serif;font-size:14px;text-align:right;pointer-events:none;text-shadow:0 0 10px rgba(255,102,136,0.8)}
    #crowd-indicator .crowd-val{font-size:28px;font-weight:800;display:block}
    #crowd-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;opacity:0;transition:opacity 1.5s;background:radial-gradient(ellipse at center, transparent 20%, rgba(80,0,0,0.25) 100%)}
    #spotlight-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;opacity:0;transition:opacity 2s;background:radial-gradient(circle at 50% 40%, rgba(255,255,200,0.15) 0%, transparent 40%, rgba(0,0,0,0.3) 100%)}
  </style>
</head>
<body>
  <div id="crowd-indicator"><span class="crowd-val" id="crowd-display">12</span>people watching</div>
  <div id="crowd-overlay"></div>
  <div id="spotlight-overlay"></div>
  <div class="scene-ui">
    <div class="scene-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>👥 Social Anxiety Therapy</h1>
      <div></div>
    </div>
    <div class="level-selector">
      <button class="level-btn active" onclick="setLevel(1)">Level 1: Interrogation Room</button>
      <button class="level-btn" onclick="setLevel(2)">Level 2: Live TV Broadcast</button>
      <button class="level-btn" onclick="setLevel(3)">Level 3: World Arena Summit</button>
    </div>
  </div>
  <div class="breathing-guide"><div class="breath-circle">Breathe In</div><div class="breath-label">Follow the rhythm</div></div>
  <div class="anxiety-meter"><span class="meter-label">Anxiety</span><div class="meter-track"><div class="meter-fill" style="height:30%"></div></div></div>
  <div class="comfort-msg" style="opacity:0;">You are safe here.</div>

  <a-scene id="vrscene" vr-mode-ui="enabled:true" renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true; logarithmicDepthBuffer:true" fog="type:linear; color:#1a1a1a; near:20; far:60">
    <a-entity id="rig" position="0 1.6 0" thumbstick-locomotion="speed:3">
      <a-camera look-controls wasd-controls="acceleration:20">
        <a-cursor color="#ff6688" fuse="false" raycaster="far:200"></a-cursor>
      </a-camera>
      <a-entity id="left-hand" oculus-touch-controls="hand:left" laser-controls="hand:left"></a-entity>
      <a-entity id="right-hand" oculus-touch-controls="hand:right" laser-controls="hand:right"></a-entity>
    </a-entity>

    <!-- ======= LEVEL 1: INTERROGATION ROOM ======= -->
    <a-entity id="level1" visible="true">
      <a-sky color="#0e0e14"></a-sky>
      <a-light type="ambient" color="#556" intensity="0.5"></a-light>
      <a-light type="spot" position="0 4 0" color="#ffffdd" intensity="5" distance="12" angle="40" decay="1" target="#interrogation-target"></a-light>
      <a-entity id="interrogation-target" position="0 0 0"></a-entity>
      <a-light type="point" position="0 3 -2.2" color="#ddccbb" intensity="2" distance="6"></a-light>
      <a-light type="point" position="0 2.5 0" color="#aaa" intensity="0.8" distance="10"></a-light>

      <!-- Concrete Room -->
      <a-box position="0 2.5 0" width="6" height="5" depth="6" material="color:#222; roughness:0.9; side:back"></a-box>
      <a-box position="0 0 0" width="6" height="0.1" depth="6" material="color:#1a1a1a; roughness:0.8"></a-box>
      <a-box position="0 5 0" width="6" height="0.1" depth="6" material="color:#1a1a1a; roughness:0.9"></a-box>

      <!-- Metal table -->
      <a-box position="0 0.9 -1.3" width="2" height="0.06" depth="1" material="color:#888; metalness:0.8; roughness:0.2"></a-box>
      <a-cylinder position="-0.8 0.45 -1.6" radius="0.03" height="0.9" material="color:#666; metalness:0.8"></a-cylinder>
      <a-cylinder position="0.8 0.45 -1.6" radius="0.03" height="0.9" material="color:#666; metalness:0.8"></a-cylinder>
      <a-cylinder position="-0.8 0.45 -1" radius="0.03" height="0.9" material="color:#666; metalness:0.8"></a-cylinder>
      <a-cylinder position="0.8 0.45 -1" radius="0.03" height="0.9" material="color:#666; metalness:0.8"></a-cylinder>

      <!-- Your chair -->
      <a-box position="0 0.5 0.5" width="0.5" height="0.05" depth="0.5" material="color:#777; metalness:0.7"></a-box>
      <a-box position="0 0.85 0.75" width="0.5" height="0.7" depth="0.05" material="color:#777; metalness:0.7"></a-box>

      <!-- === INTERROGATORS (3 seated, high detail, facing you) === -->
      <a-entity position="0 0 -2.2" realistic-person="skin:#c8a080; shirt:#1a1a2e; pants:#1a1a2a; shoes:#111; hair:#1a1008; hairStyle:short; pose:sitting-crossed; detail:high"></a-entity>
      <a-entity position="-1.5 0 -2.2" realistic-person="skin:#8a7058; shirt:#2a2a1e; pants:#1a1a1a; shoes:#111; hair:#0a0808; hairStyle:short; pose:leaning; detail:high"></a-entity>
      <a-entity position="1.5 0 -2.2" realistic-person="skin:#d4b898; shirt:#222238; pants:#1a1a22; shoes:#111; hair:#2a1a08; hairStyle:medium; pose:sitting; detail:high"></a-entity>

      <!-- Manila folder and papers -->
      <a-box position="-0.3 0.94 -1.3" width="0.3" height="0.03" depth="0.4" material="color:#c8a860"></a-box>
      <a-plane position="0.3 0.94 -1.3" width="0.25" height="0.35" material="color:#eee8d0" rotation="-90 5 0"></a-plane>

      <!-- One-way mirror -->
      <a-box position="2.99 2.5 0" width="0.05" height="3" depth="4" material="color:#111; metalness:0.9; opacity:0.8; transparent:true"></a-box>

      <!-- === MIRROR OBSERVERS (5, facing through mirror toward you) === -->
      <a-entity position="4 0 -1" rotation="0 -90 0" realistic-person="skin:#9a8070; shirt:#1a1a28; pants:#151520; shoes:#111; hair:#0a0808; hairStyle:short; pose:standing; detail:medium"></a-entity>
      <a-entity position="4 0 0.6" rotation="0 -90 0" realistic-person="skin:#6a5040; shirt:#1a1a22; pants:#151518; shoes:#111; hair:#111; hairStyle:bald; pose:standing; detail:medium"></a-entity>
      <a-entity position="4.5 0 -0.3" rotation="0 -90 0" realistic-person="skin:#aa8870; shirt:#181828; pants:#141420; shoes:#111; hair:#0a0a05; hairStyle:short; pose:standing; detail:medium"></a-entity>
      <a-entity position="5 0 0.8" rotation="0 -90 0" realistic-person="skin:#8a7058; shirt:#1a1a25; pants:#151520; shoes:#111; hair:#1a1008; hairStyle:short; pose:standing; detail:low"></a-entity>
      <a-entity position="5.2 0 -0.8" rotation="0 -90 0" realistic-person="skin:#c0a080; shirt:#1a1a22; pants:#141418; shoes:#111; hair:#2a1a08; hairStyle:short; pose:standing; detail:low"></a-entity>

      <!-- === GUARDS & ROOM OBSERVERS (5, high detail) === -->
      <a-entity position="-2 0 2.5" rotation="0 180 0" realistic-person="skin:#c0a080; shirt:#2a2a35; pants:#1a1a22; shoes:#111; hair:#1a1008; hairStyle:short; pose:standing; detail:high"></a-entity>
      <a-entity position="1.5 0 2.5" rotation="0 180 0" realistic-person="skin:#6a5040; shirt:#2a2a30; pants:#1a1a22; shoes:#111; hair:#0a0808; hairStyle:short; pose:standing; detail:high"></a-entity>
      <a-entity position="-2.7 0 -0.5" rotation="0 90 0" realistic-person="skin:#d4b898; shirt:#333340; pants:#222230; shoes:#111; hair:#4a3018; hairStyle:medium; pose:standing; detail:high"></a-entity>
      <a-entity position="-2.7 0 -1.8" rotation="0 90 0" realistic-person="skin:#b89878; shirt:#2c3030; pants:#1a1a22; shoes:#111; hair:#2a1a08; hairStyle:short; pose:standing; detail:high"></a-entity>
      <a-entity position="0 0 -2.8" realistic-person="skin:#aa8870; shirt:#2a2540; pants:#1a1a2a; shoes:#111; hair:#0a0a08; hairStyle:short; pose:standing; detail:high"></a-entity>

      <!-- Recording indicator (red dot) -->
      <a-sphere position="2 4.5 -2" radius="0.05" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0"
                animation="property:material.emissiveIntensity; from:0; to:0.8; dur:1500; dir:alternate; loop:true"></a-sphere>

      <a-text value="INTERROGATION ROOM — 12 people watching your every move.\nA blinding light shines down. They know everything.\nGuards block the exit. Observers lurk behind the mirror.\nThey're ALL waiting for you to speak. The silence crushes you." position="0 3.8 -1" align="center" color="#ff6688" scale="0.3 0.3 0.3" face-camera></a-text>
    </a-entity>

    <!-- ======= LEVEL 2: LIVE TV BROADCAST ======= -->
    <a-entity id="level2" visible="false">
      <a-sky color="#111118"></a-sky>
      <a-light type="ambient" color="#333" intensity="0.3"></a-light>
      <a-light type="spot" position="-3 6 3" color="#ffffee" intensity="4" distance="15" angle="35" target="#tv-target" cast-shadow="true"></a-light>
      <a-light type="spot" position="3 6 3" color="#ffffee" intensity="4" distance="15" angle="35" target="#tv-target" cast-shadow="true"></a-light>
      <a-light type="spot" position="0 7 -2" color="#eeeeff" intensity="3" distance="12" angle="25" target="#tv-target" cast-shadow="true"></a-light>
      <a-entity id="tv-target" position="0 1.2 0"></a-entity>
      <a-light type="point" position="0 4 -9" color="#aabbcc" intensity="1.5" distance="12"></a-light>
      <a-light type="point" position="-5 3 -8" color="#99aabb" intensity="0.8" distance="8"></a-light>
      <a-light type="point" position="5 3 -8" color="#99aabb" intensity="0.8" distance="8"></a-light>

      <!-- Studio ceiling grid -->
      <a-box position="0 7 0" width="20" height="0.1" depth="16" material="color:#111; metalness:0.5"></a-box>
      <a-cylinder position="-3 6.5 3" radius="0.15" height="0.3" material="color:#333; metalness:0.7"></a-cylinder>
      <a-cylinder position="3 6.5 3" radius="0.15" height="0.3" material="color:#333; metalness:0.7"></a-cylinder>
      <a-cylinder position="0 7.2 -2" radius="0.12" height="0.5" material="color:#333; metalness:0.7"></a-cylinder>

      <!-- Studio floor -->
      <a-box position="0 0 0" width="20" height="0.1" depth="16" material="color:#1a1a22; roughness:0.3; metalness:0.2"></a-box>

      <!-- News desk -->
      <a-box position="0 0.6 0" width="3.5" height="1.2" depth="0.8" material="color:#1a2233; metalness:0.4; roughness:0.3"></a-box>
      <a-box position="0 0.6 -0.41" width="3.4" height="1.15" depth="0.02" material="color:#cc2244; metalness:0.3"></a-box>
      <a-text position="0 0.6 -0.43" value="BREAKING NEWS" color="#ffffff" scale="0.35 0.35 0.35" align="center"></a-text>
      <a-box position="0 1.8 -2.5" width="0.8" height="0.5" depth="0.05" material="color:#000; emissive:#001100; emissiveIntensity:0.1"
             animation="property:material.emissiveIntensity; from:0.1; to:0; dur:5000; easing:easeInQuad"></a-box>
      <a-cylinder position="0.6 1.35 0" radius="0.02" height="0.3" material="color:#333; metalness:0.8"></a-cylinder>
      <a-sphere position="0.6 1.5 0" radius="0.035" material="color:#222; metalness:0.6"></a-sphere>
      <a-plane position="-0.3 1.21 0.1" width="0.25" height="0.35" material="color:#fff; opacity:0.8; transparent:true" rotation="-85 10 0"></a-plane>
      <a-plane position="0.2 1.21 -0.1" width="0.22" height="0.3" material="color:#fff; opacity:0.7; transparent:true" rotation="-85 -8 0"></a-plane>

      <!-- CAMERAS -->
      <a-entity position="0 1.5 -5">
        <a-box width="0.8" height="0.6" depth="1.2" material="color:#222; metalness:0.5"></a-box>
        <a-cylinder position="0 0 -0.7" radius="0.15" height="0.3" material="color:#111; metalness:0.8" rotation="90 0 0"></a-cylinder>
        <a-sphere position="0 0.35 -0.3" radius="0.06" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0.8"
                  animation="property:material.emissiveIntensity; from:0.8; to:0.3; dur:1000; dir:alternate; loop:true"></a-sphere>
        <a-cylinder position="0 -0.5 0" radius="0.06" height="1.5" material="color:#333; metalness:0.7"></a-cylinder>
      </a-entity>
      <a-entity position="-4 1.4 -4" rotation="0 25 0">
        <a-box width="0.7" height="0.55" depth="1.1" material="color:#222; metalness:0.5"></a-box>
        <a-cylinder position="0 0 -0.65" radius="0.13" height="0.3" material="color:#111; metalness:0.8" rotation="90 0 0"></a-cylinder>
        <a-sphere position="0 0.32 -0.3" radius="0.05" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0.5"></a-sphere>
      </a-entity>
      <a-entity position="4 2.5 -3" rotation="0 -20 0">
        <a-box width="0.6" height="0.5" depth="1" material="color:#222; metalness:0.5"></a-box>
        <a-cylinder position="0 0 -0.6" radius="0.12" height="0.25" material="color:#111; metalness:0.8" rotation="90 0 0"></a-cylinder>
      </a-entity>

      <!-- Live monitors -->
      <a-box position="-3 3 -7" width="3" height="2" depth="0.1" material="color:#111"></a-box>
      <a-plane position="-3 3 -6.94" width="2.8" height="1.8" material="color:#c8a080; opacity:0.3; transparent:true"
               animation="property:material.opacity; from:0.25; to:0.35; dur:2000; dir:alternate; loop:true"></a-plane>
      <a-text position="-3 2.2 -6.9" value="LIVE" color="#ff0000" scale="0.25 0.25 0.25" align="center"></a-text>
      <a-box position="3 3 -7" width="3" height="2" depth="0.1" material="color:#111"></a-box>
      <a-plane position="3 3 -6.94" width="2.8" height="1.8" material="color:#c8a080; opacity:0.3; transparent:true"></a-plane>
      <a-text position="3 2.2 -6.9" value="LIVE" color="#ff0000" scale="0.25 0.25 0.25" align="center"></a-text>

      <!-- === CREW (4 people, medium detail) === -->
      <a-entity position="-2 0 -6" realistic-person="skin:#b89878; shirt:#2a2a33; pants:#1a1a22; hair:#1a1008; hairStyle:short; pose:standing; detail:medium"></a-entity>
      <a-entity position="2 0 -5.5" realistic-person="skin:#c0a080; shirt:#2a2a30; pants:#1a1a22; hair:#2a1a08; hairStyle:short; pose:standing; detail:medium"></a-entity>
      <a-entity position="5 0 -5" realistic-person="skin:#6a5040; shirt:#2a3030; pants:#1a1a22; hair:#0a0808; hairStyle:short; pose:standing; detail:medium"></a-entity>
      <a-entity position="-5 0 -4" realistic-person="skin:#d4b898; shirt:#2a2a2a; pants:#1a1a1a; hair:#4a3018; hairStyle:medium; pose:standing; detail:medium"></a-entity>

      <!-- === AUDIENCE Front Row (8 seated, medium) === -->
      <a-entity position="-4 0 -7.5" realistic-person="skin:#c0a080; shirt:#2a1a2a; pants:#1a1a22; hair:#1a1008; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="-2.5 0 -7.8" realistic-person="skin:#8a7058; shirt:#1a2a1a; pants:#1a1a1a; hair:#0a0808; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="-1 0 -8" realistic-person="skin:#d4b898; shirt:#222238; pants:#1a1a22; hair:#4a3018; hairStyle:long; pose:sitting; detail:medium"></a-entity>
      <a-entity position="0.5 0 -8" realistic-person="skin:#c8a888; shirt:#2a2a1a; pants:#1a1a1a; hair:#1a1008; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="2 0 -7.8" realistic-person="skin:#6a5040; shirt:#1a1a33; pants:#1a1a22; hair:#0a0808; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="3.5 0 -7.5" realistic-person="skin:#b89070; shirt:#2a1a1a; pants:#1a1a1a; hair:#111; hairStyle:bald; pose:sitting; detail:medium"></a-entity>
      <a-entity position="5.5 0 -6.5" realistic-person="skin:#d0b090; shirt:#222222; pants:#1a1a1a; hair:#2a1a08; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="-5.5 0 -6.5" realistic-person="skin:#aa8870; shirt:#1a2a2a; pants:#1a1a22; hair:#0a0808; hairStyle:medium; pose:sitting; detail:medium"></a-entity>

      <!-- === AUDIENCE Second Row (10 seated, medium) === -->
      <a-entity position="-6 0.6 -9" realistic-person="skin:#c0a080; shirt:#1a1a22; pants:#151520; hair:#1a1008; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="-4.5 0.6 -9.5" realistic-person="skin:#8a7058; shirt:#22221a; pants:#151518; hair:#0a0808; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="-3 0.6 -9.8" realistic-person="skin:#d4b898; shirt:#1a2222; pants:#151518; hair:#4a3018; hairStyle:long; pose:sitting; detail:medium"></a-entity>
      <a-entity position="-1.5 0.6 -10" realistic-person="skin:#c8a888; shirt:#221a1a; pants:#151520; hair:#1a1008; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="0 0.6 -10.2" realistic-person="skin:#6a5040; shirt:#222; pants:#151518; hair:#0a0808; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="1.5 0.6 -10" realistic-person="skin:#b89070; shirt:#2a2a1a; pants:#151520; hair:#2a1a08; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="3 0.6 -9.8" realistic-person="skin:#d0b090; shirt:#1a221a; pants:#151518; hair:#1a1008; hairStyle:medium; pose:sitting; detail:medium"></a-entity>
      <a-entity position="4.5 0.6 -9.5" realistic-person="skin:#aa8870; shirt:#2a1a22; pants:#151520; hair:#0a0808; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="6 0.6 -9" realistic-person="skin:#b89878; shirt:#1a1a2a; pants:#151518; hair:#1a1008; hairStyle:short; pose:sitting; detail:medium"></a-entity>
      <a-entity position="7 0.6 -8" realistic-person="skin:#e0c0a0; shirt:#222233; pants:#151520; hair:#aa8830; hairStyle:long; pose:sitting; detail:medium"></a-entity>

      <!-- === AUDIENCE Third Row (12 seated, low) === -->
      <a-entity position="-7 1.4 -10.5" realistic-person="skin:#a08868; shirt:#151520; pants:#121218; hair:#0a0808; hairStyle:short; pose:sitting; detail:low"></a-entity>
      <a-entity position="-5.5 1.4 -11" realistic-person="skin:#b09878; shirt:#201518; pants:#121215; hair:#1a1008; hairStyle:medium; pose:sitting; detail:low"></a-entity>
      <a-entity position="-4 1.4 -11.3" realistic-person="skin:#6a5040; shirt:#152015; pants:#121218; hair:#0a0808; hairStyle:short; pose:sitting; detail:low"></a-entity>
      <a-entity position="-2.5 1.4 -11.5" realistic-person="skin:#a89070; shirt:#181820; pants:#121215; hair:#111; hairStyle:bald; pose:sitting; detail:low"></a-entity>
      <a-entity position="-1 1.4 -11.7" realistic-person="skin:#dbb898; shirt:#202018; pants:#121218; hair:#4a3018; hairStyle:short; pose:sitting; detail:low"></a-entity>
      <a-entity position="0.5 1.4 -11.8" realistic-person="skin:#c8a888; shirt:#181518; pants:#121215; hair:#0a0808; hairStyle:long; pose:sitting; detail:low"></a-entity>
      <a-entity position="2 1.4 -11.5" realistic-person="skin:#8a7058; shirt:#152020; pants:#121218; hair:#0a0808; hairStyle:short; pose:sitting; detail:low"></a-entity>
      <a-entity position="3.5 1.4 -11.3" realistic-person="skin:#b09878; shirt:#201820; pants:#121215; hair:#1a1008; hairStyle:medium; pose:sitting; detail:low"></a-entity>
      <a-entity position="5 1.4 -11" realistic-person="skin:#c0a080; shirt:#182018; pants:#121218; hair:#2a1a08; hairStyle:short; pose:sitting; detail:low"></a-entity>
      <a-entity position="6.5 1.4 -10.5" realistic-person="skin:#a89070; shirt:#181518; pants:#121215; hair:#0a0808; hairStyle:short; pose:sitting; detail:low"></a-entity>
      <a-entity position="-7.5 1.4 -9.5" realistic-person="skin:#d0b090; shirt:#202020; pants:#121218; hair:#aa8830; hairStyle:short; pose:sitting; detail:low"></a-entity>
      <a-entity position="7.5 1.4 -9.5" realistic-person="skin:#6a5040; shirt:#181820; pants:#121215; hair:#0a0808; hairStyle:short; pose:sitting; detail:low"></a-entity>

      <!-- Phone screens glowing in audience -->
      <a-sphere position="-3 1.6 -9.2" radius="0.04" material="color:#88aaff; emissive:#88aaff; emissiveIntensity:0.4; fog:false"
               animation="property:material.emissiveIntensity; from:0.2; to:0.6; dur:2000; dir:alternate; loop:true"></a-sphere>
      <a-sphere position="2 1.6 -10" radius="0.04" material="color:#88aaff; emissive:#88aaff; emissiveIntensity:0.3; fog:false"
               animation="property:material.emissiveIntensity; from:0.1; to:0.5; dur:2500; dir:alternate; loop:true"></a-sphere>
      <a-sphere position="5 0.8 -7" radius="0.04" material="color:#88aaff; emissive:#88aaff; emissiveIntensity:0.5; fog:false"
               animation="property:material.emissiveIntensity; from:0.3; to:0.7; dur:1800; dir:alternate; loop:true"></a-sphere>

      <!-- ON AIR sign -->
      <a-box position="0 5 -8" width="2" height="0.8" depth="0.1" material="color:#330000; emissive:#ff0000; emissiveIntensity:0.3"></a-box>
      <a-text position="0 5 -7.94" value="ON AIR" color="#ff0000" scale="0.5 0.5 0.5" align="center"
              animation="property:material.opacity; from:1; to:0.4; dur:1500; dir:alternate; loop:true"></a-text>

      <!-- Viewer count -->

      document.getElementById('level2').setAttribute('visible', num === 2);
      document.getElementById('level3').setAttribute('visible', num === 3);
      var rig = document.getElementById('rig');
      var scene = document.getElementById('vrscene');
      var crowd = document.getElementById('crowd-overlay');
      var spot = document.getElementById('spotlight-overlay');
      if (num === 1) { rig.setAttribute('position','0 1.6 1'); scene.setAttribute('fog','type:linear; color:#0e0e14; near:8; far:20'); crowd.style.opacity='0.3'; spot.style.opacity='0.4'; }
      if (num === 2) { rig.setAttribute('position','0 1.6 1'); scene.setAttribute('fog','type:linear; color:#111118; near:15; far:35'); crowd.style.opacity='0.4'; spot.style.opacity='0.6'; }
      if (num === 3) { rig.setAttribute('position','0 1.6 1'); scene.setAttribute('fog','type:linear; color:#0a0a15; near:20; far:70'); crowd.style.opacity='0.55'; spot.style.opacity='0.7'; }
      document.getElementById('crowd-display').textContent = crowds[num];
      document.querySelectorAll('.level-btn').forEach(function(btn, i) { btn.classList.toggle('active', i === num - 1); });
      showComfortMessage();
    }
    setInterval(function(){
      if (document.getElementById('level3').getAttribute('visible')){
        var s = document.getElementById('spotlight-overlay');
        s.style.opacity='0.9';
        setTimeout(function(){ s.style.opacity='0.7'; },100);
      }
    }, 3000 + Math.random()*5000);
    window.addEventListener('load', function() { initPhobiaScene(); initVRPhobiaApp(); setLevel(1); });
  </script>
</body>
</html>
