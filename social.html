<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Anxiety — PhobiaVR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    #crowd-indicator{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:100;color:#ff6688;font-family:Inter,sans-serif;font-size:14px;text-align:right;pointer-events:none;text-shadow:0 0 10px rgba(255,102,136,0.8)}
    #crowd-indicator .crowd-val{font-size:28px;font-weight:800;display:block}
    #crowd-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50;opacity:0;transition:opacity 1.5s;background:radial-gradient(ellipse at center, transparent 20%, rgba(80,0,0,0.25) 100%)}
    #spotlight-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:49;opacity:0;transition:opacity 2s;background:radial-gradient(circle at 50% 40%, rgba(255,255,200,0.15) 0%, transparent 40%, rgba(0,0,0,0.3) 100%)}
  </style>
</head>
<body>
  <div id="crowd-indicator"><span class="crowd-val" id="crowd-display">12</span>people watching</div>
  <div id="crowd-overlay"></div>
  <div id="spotlight-overlay"></div>
  <div class="scene-ui">
    <div class="scene-header">
      <a href="index.html" class="back-btn">← Back</a>
      <h1>👥 Social Anxiety Therapy</h1>
      <div></div>
    </div>
    <div class="level-selector">
      <button class="level-btn active" onclick="setLevel(1)">Level 1: Interrogation Room</button>
      <button class="level-btn" onclick="setLevel(2)">Level 2: Live TV Broadcast</button>
      <button class="level-btn" onclick="setLevel(3)">Level 3: World Arena Summit</button>
    </div>
  </div>
  <div class="breathing-guide"><div class="breath-circle">Breathe In</div><div class="breath-label">Follow the rhythm</div></div>
  <div class="anxiety-meter"><span class="meter-label">Anxiety</span><div class="meter-track"><div class="meter-fill" style="height:30%"></div></div></div>
  <div class="comfort-msg" style="opacity:0;">You are safe here.</div>

  <a-scene id="vrscene" vr-mode-ui="enabled:true" renderer="antialias:true; colorManagement:true; physicallyCorrectLights:true; logarithmicDepthBuffer:true" fog="type:linear; color:#1a1a1a; near:20; far:60">
    <a-entity id="rig" position="0 1.6 0">
      <a-camera look-controls wasd-controls="acceleration:20">
        <a-cursor color="#ff6688" fuse="false" raycaster="far:200"></a-cursor>
      </a-camera>
    </a-entity>

    <!-- ======= LEVEL 1: INTERROGATION ROOM ======= -->
    <a-entity id="level1" visible="true">
      <a-sky color="#0a0a0a"></a-sky>
      <a-light type="ambient" color="#111" intensity="0.1"></a-light>

      <!-- Harsh overhead spotlight directly on you -->
      <a-light type="spot" position="0 4 0" color="#ffffdd" intensity="5" distance="8" angle="25" decay="1.5" target="#interrogation-target"></a-light>
      <a-entity id="interrogation-target" position="0 0 0"></a-entity>

      <!-- The Room: Small, claustrophobic, concrete -->
      <a-box position="0 2.5 0" width="6" height="5" depth="6" material="color:#222; roughness:0.9; side:back"></a-box>
      <a-box position="0 0 0" width="6" height="0.1" depth="6" material="color:#1a1a1a; roughness:0.8"></a-box>
      <a-box position="0 5 0" width="6" height="0.1" depth="6" material="color:#1a1a1a; roughness:0.9"></a-box>

      <!-- Metal table in front of you -->
      <a-box position="0 0.9 -1.3" width="2" height="0.06" depth="1" material="color:#888; metalness:0.8; roughness:0.2"></a-box>
      <a-cylinder position="-0.8 0.45 -1.6" radius="0.03" height="0.9" material="color:#666; metalness:0.8"></a-cylinder>
      <a-cylinder position="0.8 0.45 -1.6" radius="0.03" height="0.9" material="color:#666; metalness:0.8"></a-cylinder>
      <a-cylinder position="-0.8 0.45 -1" radius="0.03" height="0.9" material="color:#666; metalness:0.8"></a-cylinder>
      <a-cylinder position="0.8 0.45 -1" radius="0.03" height="0.9" material="color:#666; metalness:0.8"></a-cylinder>

      <!-- Your chair (metal, uncomfortable) -->
      <a-box position="0 0.5 0.5" width="0.5" height="0.05" depth="0.5" material="color:#777; metalness:0.7"></a-box>
      <a-box position="0 0.85 0.75" width="0.5" height="0.7" depth="0.05" material="color:#777; metalness:0.7"></a-box>

      <!-- INTERROGATORS (3 seated across — staring at you) -->
      <!-- Person 1 (center, arms crossed) -->
      <a-entity position="0 0 -2.2">
        <a-cylinder position="0 0.8 0" radius="0.2" height="1" material="color:#1a1a2a"></a-cylinder>
        <a-sphere position="0 1.5 0" radius="0.18" material="color:#c8a080"></a-sphere>
        <a-sphere position="-0.05 1.53 0.15" radius="0.025" material="color:#111"></a-sphere>
        <a-sphere position="0.05 1.53 0.15" radius="0.025" material="color:#111"></a-sphere>
        <!-- Arms crossed -->
        <a-cylinder position="0.2 1 0.1" radius="0.06" height="0.5" material="color:#1a1a2a" rotation="0 0 -40"></a-cylinder>
        <a-cylinder position="-0.2 1 0.1" radius="0.06" height="0.5" material="color:#1a1a2a" rotation="0 0 40"></a-cylinder>
      </a-entity>

      <!-- Person 2 (left, leaning forward) -->
      <a-entity position="-1.5 0 -2.2">
        <a-cylinder position="0 0.85 0" radius="0.2" height="1.1" material="color:#2a2a1a" rotation="-10 0 0"></a-cylinder>
        <a-sphere position="0 1.55 -0.1" radius="0.18" material="color:#c0a888"></a-sphere>
        <a-sphere position="-0.05 1.58 0.05" radius="0.025" material="color:#111"></a-sphere>
        <a-sphere position="0.05 1.58 0.05" radius="0.025" material="color:#111"></a-sphere>
      </a-entity>

      <!-- Person 3 (right, writing notes) -->
      <a-entity position="1.5 0 -2.2">
        <a-cylinder position="0 0.8 0" radius="0.18" height="0.95" material="color:#222233"></a-cylinder>
        <a-sphere position="0 1.48 0" radius="0.17" material="color:#b89878"></a-sphere>
        <a-sphere position="-0.04 1.51 0.14" radius="0.023" material="color:#111"></a-sphere>
        <a-sphere position="0.04 1.51 0.14" radius="0.023" material="color:#111"></a-sphere>
        <!-- Hand on table with pen -->
        <a-cylinder position="-0.15 0.96 0.3" radius="0.05" height="0.4" material="color:#222233" rotation="0 0 70"></a-cylinder>
      </a-entity>

      <!-- Manila folder and papers on table -->
      <a-box position="-0.3 0.94 -1.3" width="0.3" height="0.03" depth="0.4" material="color:#c8a860"></a-box>
      <a-plane position="0.3 0.94 -1.3" width="0.25" height="0.35" material="color:#eee8d0" rotation="-90 5 0"></a-plane>

      <!-- One-way mirror (dark, you can see your reflection faintly) -->
      <a-box position="2.99 2.5 0" width="0.05" height="3" depth="4" material="color:#111; metalness:0.9; opacity:0.8; transparent:true"></a-box>

      <!-- Recording indicator (red dot) -->
      <a-sphere position="2 4.5 -2" radius="0.05" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0"
                animation="property:material.emissiveIntensity; from:0; to:0.8; dur:1500; dir:alternate; loop:true"></a-sphere>

      <a-text value="INTERROGATION ROOM — 3 senior agents stare at you.\nA blinding light shines down. They know everything.\nThe one-way mirror hides more watchers.\nThey're waiting for you to speak. The silence is deafening." position="0 3.8 -1" align="center" color="#ff6688" scale="0.3 0.3 0.3" face-camera></a-text>
    </a-entity>

    <!-- ======= LEVEL 2: LIVE TV BROADCAST ======= -->
    <a-entity id="level2" visible="false">
      <a-sky color="#111118"></a-sky>
      <a-light type="ambient" color="#222" intensity="0.15"></a-light>

      <!-- Studio lights (blindingly bright) -->
      <a-light type="spot" position="-3 6 3" color="#ffffee" intensity="4" distance="15" angle="35" target="#tv-target" cast-shadow="true"></a-light>
      <a-light type="spot" position="3 6 3" color="#ffffee" intensity="4" distance="15" angle="35" target="#tv-target" cast-shadow="true"></a-light>
      <a-light type="spot" position="0 7 -2" color="#eeeeff" intensity="3" distance="12" angle="25" target="#tv-target" cast-shadow="true"></a-light>
      <a-entity id="tv-target" position="0 1.2 0"></a-entity>

      <!-- Studio ceiling grid -->
      <a-box position="0 7 0" width="20" height="0.1" depth="16" material="color:#111; metalness:0.5"></a-box>
      <!-- Light rigs -->
      <a-cylinder position="-3 6.5 3" radius="0.15" height="0.3" material="color:#333; metalness:0.7"></a-cylinder>
      <a-cylinder position="3 6.5 3" radius="0.15" height="0.3" material="color:#333; metalness:0.7"></a-cylinder>
      <a-cylinder position="0 7.2 -2" radius="0.12" height="0.5" material="color:#333; metalness:0.7"></a-cylinder>

      <!-- Studio floor -->
      <a-box position="0 0 0" width="20" height="0.1" depth="16" material="color:#1a1a22; roughness:0.3; metalness:0.2"></a-box>

      <!-- News desk (you sit behind) -->
      <a-box position="0 0.6 0" width="3.5" height="1.2" depth="0.8" material="color:#1a2233; metalness:0.4; roughness:0.3"></a-box>
      <!-- Desk front panel (branded) -->
      <a-box position="0 0.6 -0.41" width="3.4" height="1.15" depth="0.02" material="color:#cc2244; metalness:0.3"></a-box>
      <a-text position="0 0.6 -0.43" value="BREAKING NEWS" color="#ffffff" scale="0.35 0.35 0.35" align="center"></a-text>
      <!-- Teleprompter (blank — words disappeared) -->
      <a-box position="0 1.8 -2.5" width="0.8" height="0.5" depth="0.05" material="color:#000; emissive:#001100; emissiveIntensity:0.1"
             animation="property:material.emissiveIntensity; from:0.1; to:0; dur:5000; easing:easeInQuad"></a-box>
      <!-- Your microphone -->
      <a-cylinder position="0.6 1.35 0" radius="0.02" height="0.3" material="color:#333; metalness:0.8"></a-cylinder>
      <a-sphere position="0.6 1.5 0" radius="0.035" material="color:#222; metalness:0.6"></a-sphere>
      <!-- Papers scattered -->
      <a-plane position="-0.3 1.21 0.1" width="0.25" height="0.35" material="color:#fff; opacity:0.8; transparent:true" rotation="-85 10 0"></a-plane>
      <a-plane position="0.2 1.21 -0.1" width="0.22" height="0.3" material="color:#fff; opacity:0.7; transparent:true" rotation="-85 -8 0"></a-plane>

      <!-- CAMERAS pointed at you (3 large TV cameras) -->
      <!-- Camera 1 (center, red tally light ON) -->
      <a-entity position="0 1.5 -5">
        <a-box width="0.8" height="0.6" depth="1.2" material="color:#222; metalness:0.5"></a-box>
        <a-cylinder position="0 0 -0.7" radius="0.15" height="0.3" material="color:#111; metalness:0.8" rotation="90 0 0"></a-cylinder>
        <a-sphere position="0 0.35 -0.3" radius="0.06" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0.8"
                  animation="property:material.emissiveIntensity; from:0.8; to:0.3; dur:1000; dir:alternate; loop:true"></a-sphere>
        <a-cylinder position="0 -0.5 0" radius="0.06" height="1.5" material="color:#333; metalness:0.7"></a-cylinder>
      </a-entity>
      <!-- Camera 2 (left) -->
      <a-entity position="-4 1.4 -4" rotation="0 25 0">
        <a-box width="0.7" height="0.55" depth="1.1" material="color:#222; metalness:0.5"></a-box>
        <a-cylinder position="0 0 -0.65" radius="0.13" height="0.3" material="color:#111; metalness:0.8" rotation="90 0 0"></a-cylinder>
        <a-sphere position="0 0.32 -0.3" radius="0.05" material="color:#ff0000; emissive:#ff0000; emissiveIntensity:0.5"></a-sphere>
      </a-entity>
      <!-- Camera 3 (right, on crane) -->
      <a-entity position="4 2.5 -3" rotation="0 -20 0">
        <a-box width="0.6" height="0.5" depth="1" material="color:#222; metalness:0.5"></a-box>
        <a-cylinder position="0 0 -0.6" radius="0.12" height="0.25" material="color:#111; metalness:0.8" rotation="90 0 0"></a-cylinder>
      </a-entity>

      <!-- Live studio monitors showing YOUR face (behind cameras) -->
      <a-box position="-3 3 -7" width="3" height="2" depth="0.1" material="color:#111"></a-box>
      <a-plane position="-3 3 -6.94" width="2.8" height="1.8" material="color:#c8a080; opacity:0.3; transparent:true"
               animation="property:material.opacity; from:0.25; to:0.35; dur:2000; dir:alternate; loop:true"></a-plane>
      <a-text position="-3 2.2 -6.9" value="LIVE" color="#ff0000" scale="0.25 0.25 0.25" align="center"></a-text>
      <a-box position="3 3 -7" width="3" height="2" depth="0.1" material="color:#111"></a-box>
      <a-plane position="3 3 -6.94" width="2.8" height="1.8" material="color:#c8a080; opacity:0.3; transparent:true"></a-plane>
      <a-text position="3 2.2 -6.9" value="LIVE" color="#ff0000" scale="0.25 0.25 0.25" align="center"></a-text>

      <!-- Crew members (silhouettes in darkness behind cameras) -->
      <a-entity position="-2 0 -6">
        <a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#111"></a-cylinder>
        <a-sphere position="0 1.35 0" radius="0.14" material="color:#111"></a-sphere>
      </a-entity>
      <a-entity position="2 0 -5.5">
        <a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#111"></a-cylinder>
        <a-sphere position="0 1.35 0" radius="0.14" material="color:#111"></a-sphere>
      </a-entity>
      <a-entity position="5 0 -5">
        <a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#111"></a-cylinder>
        <a-sphere position="0 1.35 0" radius="0.14" material="color:#111"></a-sphere>
      </a-entity>
      <a-entity position="-5 0 -4">
        <a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#111"></a-cylinder>
        <a-sphere position="0 1.35 0" radius="0.14" material="color:#111"></a-sphere>
      </a-entity>

      <!-- "ON AIR" sign on wall -->
      <a-box position="0 5 -8" width="2" height="0.8" depth="0.1" material="color:#330000; emissive:#ff0000; emissiveIntensity:0.3"></a-box>
      <a-text position="0 5 -7.94" value="ON AIR" color="#ff0000" scale="0.5 0.5 0.5" align="center"
              animation="property:material.opacity; from:1; to:0.4; dur:1500; dir:alternate; loop:true"></a-text>

      <!-- Viewer count display -->
      <a-box position="6 4 -3" width="1.2" height="0.6" depth="0.05" material="color:#111"></a-box>
      <a-text position="6 4.1 -2.94" value="VIEWERS" color="#aaa" scale="0.12 0.12 0.12" align="center"></a-text>
      <a-text position="6 3.9 -2.94" value="14,200,000" color="#ff4444" scale="0.15 0.15 0.15" align="center"
              animation="property:value; from:14200000; to:14200000; dur:1; loop:false"></a-text>

      <a-text value="LIVE TV — 14.2 MILLION watching right now.\nThe teleprompter just went blank. You're on your own.\nThree cameras record every bead of sweat.\nThe producer screams in your earpiece: KEEP TALKING!" position="0 4.5 -2" align="center" color="#ff6688" scale="0.35 0.35 0.35" face-camera></a-text>
    </a-entity>

    <!-- ======= LEVEL 3: WORLD ARENA SUMMIT ======= -->
    <a-entity id="level3" visible="false">
      <a-sky color="#0a0a15"></a-sky>
      <a-light type="ambient" color="#1a1a25" intensity="0.15"></a-light>

      <!-- Massive spotlight on your podium -->
      <a-light type="spot" position="0 30 0" color="#ffffee" intensity="6" distance="40" angle="15" target="#podium-target" cast-shadow="true"></a-light>
      <a-entity id="podium-target" position="0 0 0"></a-entity>
      <a-light type="point" position="0 3 0" color="#ffeedd" intensity="0.5" distance="8"></a-light>

      <!-- The Arena (massive circular) -->
      <a-cylinder position="0 0 0" radius="60" height="0.3" material="color:#1a1520; roughness:0.3; metalness:0.2" open-ended="false"></a-cylinder>

      <!-- Your podium (glass + steel) -->
      <a-box position="0 0.7 0" width="1.2" height="1.4" depth="0.6" material="color:#333; metalness:0.6; roughness:0.2"></a-box>
      <a-box position="0 0.7 -0.31" width="1.1" height="1.3" depth="0.02" material="color:#99aacc; opacity:0.3; transparent:true; metalness:0.8"></a-box>
      <!-- Microphones on podium -->
      <a-cylinder position="-0.2 1.55 -0.1" radius="0.015" height="0.3" material="color:#333; metalness:0.8"></a-cylinder>
      <a-sphere position="-0.2 1.7 -0.1" radius="0.025" material="color:#222; metalness:0.6"></a-sphere>
      <a-cylinder position="0.2 1.55 -0.1" radius="0.015" height="0.3" material="color:#333; metalness:0.8"></a-cylinder>
      <a-sphere position="0.2 1.7 -0.1" radius="0.025" material="color:#222; metalness:0.6"></a-sphere>

      <!-- MASSIVE tiered seating — 500+ audience arranged in semicircle -->
      <!-- Row 1 (closest, 30 people — leaders, suits) -->
      <a-entity id="row1">
        <a-entity position="-12 0 -8"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#1a1a33"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#c8a888"></a-sphere></a-entity>
        <a-entity position="-10 0 -9"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#2a1a1a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#b89878"></a-sphere></a-entity>
        <a-entity position="-8 0 -10"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#1a2a1a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#d4b898"></a-sphere></a-entity>
        <a-entity position="-6 0 -10.5"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#2a2a2a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#c0a080"></a-sphere></a-entity>
        <a-entity position="-4 0 -11"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#1a1a2a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#c8b090"></a-sphere></a-entity>
        <a-entity position="-2 0 -11.2"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#2a1a2a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#b89070"></a-sphere></a-entity>
        <a-entity position="0 0 -11.5"><a-cylinder position="0 0.7 0" radius="0.16" height="1.05" material="color:#111133"></a-cylinder><a-sphere position="0 1.4 0" radius="0.15" material="color:#c8a080"></a-sphere></a-entity>
        <a-entity position="2 0 -11.2"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#1a2a2a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#d0b090"></a-sphere></a-entity>
        <a-entity position="4 0 -11"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#2a2a1a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#c0a888"></a-sphere></a-entity>
        <a-entity position="6 0 -10.5"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#1a1a1a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#b89878"></a-sphere></a-entity>
        <a-entity position="8 0 -10"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#2a1a2a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#d4b898"></a-sphere></a-entity>
        <a-entity position="10 0 -9"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#1a2a1a"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#c8a080"></a-sphere></a-entity>
        <a-entity position="12 0 -8"><a-cylinder position="0 0.7 0" radius="0.15" height="1" material="color:#222233"></a-cylinder><a-sphere position="0 1.35 0" radius="0.14" material="color:#c0a888"></a-sphere></a-entity>
      </a-entity>

      <!-- Row 2 (elevated, wider arc) -->
      <a-entity id="row2">
        <a-entity position="-16 1.5 -12"><a-cylinder position="0 0.7 0" radius="0.14" height="0.95" material="color:#1a1a2a"></a-cylinder><a-sphere position="0 1.3 0" radius="0.13" material="color:#c0a080"></a-sphere></a-entity>
        <a-entity position="-13 1.5 -14"><a-cylinder position="0 0.7 0" radius="0.14" height="0.95" material="color:#2a2a1a"></a-cylinder><a-sphere position="0 1.3 0" radius="0.13" material="color:#b89878"></a-sphere></a-entity>
        <a-entity position="-10 1.5 -15.5"><a-cylinder position="0 0.7 0" radius="0.14" height="0.95" material="color:#1a2a2a"></a-cylinder><a-sphere position="0 1.3 0" radius="0.13" material="color:#d4b898"></a-sphere></a-entity>
        <a-entity position="-7 1.5 -16.5"><a-cylinder position="0 0.7 0" radius="0.14" height="0.95" material="color:#2a1a1a"></a-cylinder><a-sphere position="0 1.3 0" radius="0.13" material="color:#c8a888"></a-sphere></a-entity>

  <script src="shared.js"></script>
  <script>
    var crowds = { 1: '3', 2: '14.2M', 3: '500+' };
    function setLevel(num) {
      document.getElementById('level1').setAttribute('visible', num === 1);
      document.getElementById('level2').setAttribute('visible', num === 2);
      document.getElementById('level3').setAttribute('visible', num === 3);
      var rig = document.getElementById('rig');
      var scene = document.getElementById('vrscene');
      var crowd = document.getElementById('crowd-overlay');
      var spot = document.getElementById('spotlight-overlay');
      if (num === 1) { rig.setAttribute('position','0 1.6 1'); scene.setAttribute('fog','type:linear; color:#0a0a0a; near:5; far:10'); crowd.style.opacity='0.3'; spot.style.opacity='0.4'; }
      if (num === 2) { rig.setAttribute('position','0 1.6 1'); scene.setAttribute('fog','type:linear; color:#111118; near:10; far:25'); crowd.style.opacity='0.4'; spot.style.opacity='0.6'; }
      if (num === 3) { rig.setAttribute('position','0 1.6 1'); scene.setAttribute('fog','type:linear; color:#0a0a15; near:20; far:70'); crowd.style.opacity='0.55'; spot.style.opacity='0.7'; }
      document.getElementById('crowd-display').textContent = crowds[num];
      document.querySelectorAll('.level-btn').forEach(function(btn, i) { btn.classList.toggle('active', i === num - 1); });
      showComfortMessage();
    }
    // Camera flash simulation
    setInterval(function(){
      if (document.getElementById('level3').getAttribute('visible')){
        var s = document.getElementById('spotlight-overlay');
        s.style.opacity='0.9';
        setTimeout(function(){ s.style.opacity='0.7'; },100);
      }
    }, 3000 + Math.random()*5000);
    window.addEventListener('load', function() { initPhobiaScene(); initVRPhobiaApp(); setLevel(1); });
  </script>
